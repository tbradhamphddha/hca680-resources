<style>
  :root{--edgewood-red:#BB0000;--black:#000000;--white:#FFFFFF;--dark-gold:#C8932B;--warm-grey:#F0EEEB;--dark-web-grey:#58595B;--slate-blue:#5794AD;--light-grey:#C2C6C8;}
  *{box-sizing:border-box;}body{font-family:'Source Sans Pro',Arial,sans-serif;background:var(--warm-grey);color:var(--black);margin:0;padding:0;line-height:1.6;}
  .wrap{max-width:860px;margin:0 auto;padding:24px 20px 60px;}
  header{background:var(--black);color:var(--white);padding:28px 20px;text-align:center;}
  header h1{font-family:'Spectral',Georgia,serif;margin:0 0 6px;font-size:1.7rem;letter-spacing:.5px;}
  header p{margin:0;color:var(--light-grey);font-size:.95rem;}
  .accent-bar{height:6px;background:var(--edgewood-red);}
  .card{background:var(--white);border:1px solid var(--light-grey);border-radius:6px;padding:24px;margin-top:24px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
  .progress-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;margin-bottom:4px;font-size:.9rem;color:var(--dark-web-grey);}
  .progress-bar-bg{background:var(--light-grey);border-radius:4px;height:8px;overflow:hidden;margin-bottom:4px;}
  .progress-bar-fill{background:var(--edgewood-red);height:100%;transition:width .3s ease;}
  .step-label{display:inline-block;background:var(--dark-gold);color:var(--white);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:3px;margin-bottom:12px;}
  .case-title{font-family:'Spectral',Georgia,serif;font-size:1.4rem;margin:0 0 14px;color:var(--black);}
  .vignette{background:var(--warm-grey);border-left:4px solid var(--slate-blue);padding:16px 18px;border-radius:4px;margin-bottom:18px;font-size:1rem;}
  .question{font-weight:700;margin-bottom:4px;font-size:1.05rem;}
  .reference-box{background:var(--warm-grey);border:1px solid var(--light-grey);border-radius:4px;padding:12px 16px;margin-bottom:16px;font-size:.88rem;color:var(--dark-web-grey);}
  .reference-box strong{color:var(--black);}
  .reference-box ul{margin:8px 0 0;padding-left:18px;}
  .reference-box li{margin-bottom:4px;}
  .options{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;}
  .opt-btn{flex:1 1 220px;background:var(--white);border:2px solid var(--slate-blue);color:var(--black);font-family:inherit;font-size:.98rem;font-weight:600;padding:14px 18px;border-radius:5px;cursor:pointer;transition:all .15s ease;text-align:left;}
  .opt-btn:hover{background:var(--slate-blue);color:var(--white);}
  .opt-btn.selected-correct{background:#2e7d32;border-color:#2e7d32;color:var(--white);}
  .opt-btn.selected-redirect{background:var(--edgewood-red);border-color:var(--edgewood-red);color:var(--white);}
  .opt-btn:disabled{cursor:default;opacity:1;}
  .opt-btn:disabled:not(.selected-correct):not(.selected-redirect){opacity:.45;}
  .feedback{margin-top:18px;padding:16px 18px;border-radius:5px;font-size:.97rem;display:none;}
  .feedback.show{display:block;animation:fadein .25s ease;}
  .feedback.correct{background:#eaf5ea;border-left:4px solid #2e7d32;}
  .feedback.neutral{background:var(--warm-grey);border-left:4px solid var(--slate-blue);}
  .feedback.outcome{background:#f0f4ff;border-left:4px solid var(--slate-blue);}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .nav-row{display:flex;justify-content:flex-end;margin-top:22px;}
  .nav-btn{background:var(--edgewood-red);color:var(--white);border:none;font-family:inherit;font-size:1rem;font-weight:700;padding:12px 28px;border-radius:5px;cursor:pointer;display:none;}
  .nav-btn.show{display:inline-block;}
  .nav-btn:hover{background:#930000;}
  .not-a-safety-event{background:var(--black);color:var(--white);font-family:'Spectral',Georgia,serif;font-size:1.4rem;font-weight:700;padding:20px 30px;border-radius:6px;margin:14px 0;display:inline-block;}
  .summary-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.92rem;}
  .summary-table th,.summary-table td{border:1px solid var(--light-grey);padding:8px 10px;text-align:left;}
  .summary-table th{background:var(--black);color:var(--white);font-family:'Spectral',Georgia,serif;font-weight:600;}
  .summary-table tr:nth-child(even) td{background:var(--warm-grey);}
  .restart-btn{background:transparent;border:2px solid var(--dark-web-grey);color:var(--dark-web-grey);font-family:inherit;font-weight:700;padding:10px 22px;border-radius:5px;cursor:pointer;margin-top:18px;}
  .restart-btn:hover{background:var(--dark-web-grey);color:var(--white);}
  .small-note{font-size:.85rem;color:var(--dark-web-grey);margin-top:18px;text-align:center;}
  .reflection-input{width:100%;min-height:120px;border:2px solid var(--light-grey);border-radius:5px;padding:12px;font-family:inherit;font-size:0.97rem;resize:vertical;margin-top:10px;}
  .reflection-input:focus{outline:none;border-color:var(--slate-blue);}
  .submit-reflection{background:var(--slate-blue);color:var(--white);border:none;font-family:inherit;font-weight:700;padding:10px 24px;border-radius:5px;cursor:pointer;margin-top:12px;}
  .submit-reflection:hover{background:#3e7a99;}

<header class="resource-header">
    <img class="resource-header-logo" src="eu_logo_primary.jpg" alt="Edgewood University">
    <div class="resource-header-text">
        <div class="resource-header-course">HCA 680: Patient Safety and Risk</div>

    </div>

<div class="accent-bar"></div>
<div class="wrap"><div id="app"></div></div>
<script>
const VIGNETTE = "A 32-year-old woman, Gravida 2 Para 1, presents at 40 weeks gestation in active labor. Labor progress is appropriate and is managed according to standard Labor and Delivery protocols. There are no identified risk factors. Fetal monitoring throughout labor is reassuring. After an uncomplicated vaginal delivery, a healthy infant is born with Apgar scores of 9 and 10 at one and five minutes respectively. Within two minutes of delivery, while the mother remains on continuous monitoring, she develops sudden and extreme respiratory distress accompanied by signs consistent with disseminated intravascular coagulation (DIC). The team recognizes the emergency immediately, activates the appropriate response, and initiates all available resuscitative interventions. Despite sustained and comprehensive efforts, the mother expires. Autopsy confirms the diagnosis of amniotic fluid embolism.";

let step="intro", kctIndex=0;
const app=document.getElementById('app');
function vign(){return `<div class="vignette"><strong>The Event:</strong> ${VIGNETTE}</div>`;}
function pb(n,t,l){return `<div class="progress-row"><span>${l}</span><span>Step ${n} of ${t}</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round(n/t*100)}%;"></div></div>`;}

function renderIntro(){
  app.innerHTML=`<div class="card"><span class="step-label">Case 15</span><div style="font-size:1.05rem;margin-bottom:16px;"><p>You open the final event in your queue. A maternal death has been reported from Labor and Delivery.</p><p>This case is structurally different from every case you have worked through so far. Read the event carefully and bring everything you have learned about how to evaluate whether a safety event has occurred.</p></div>${vign()}<div class="nav-row"><button class="nav-btn show" id="nb">Begin Discussion</button></div></div>`;
  document.getElementById('nb').onclick=()=>{step="kct-intro";render();};
}

function renderKctIntro(){
  app.innerHTML=`${pb(1,2,"Known Complication Test")}<div class="card"><span class="step-label">Applying the Known Complication Test</span><h3 class="case-title">Is This a Known Complication or a Safety Event?</h3>${vign()}<div class="reference-box"><strong>Where to begin:</strong> Before applying the SEC algorithm, the first task is always to determine whether the event represents a deviation from GAPS or whether it falls within the range of known complications of an indicated procedure or treatment. The Known Complication Test is our tool for making that determination.<br><br>You will work through all four questions. The answers in this case are different from every other case in this series. Pay close attention to how each answer connects to the clinical facts.</div><div class="nav-row"><button class="nav-btn show" id="nb">Begin the Known Complication Test</button></div></div>`;
  document.getElementById('nb').onclick=()=>{kctIndex=0;step="kct";render();};
}

const KCT_QS=[
  {
    text:"Was the procedure or treatment (vaginal delivery at 40 weeks gestation for a Gravida 2 Para 1 patient with no identified risk factors) appropriate or warranted based on nationally recognized standards of care?",
    answer:"YES",
    correct_note:"Vaginal delivery is the standard and appropriate mode of delivery for a low-risk patient at 40 weeks gestation. The clinical management throughout labor and delivery was consistent with nationally recognized standards. The procedure was indicated.",
    incorrect_note:"Think about this patient's clinical picture: a healthy 32-year-old at 40 weeks with no identified risk factors, progressing normally through labor. Vaginal delivery is the indicated, standard approach. The procedure was clinically appropriate, pointing toward YES."
  },
  {
    text:"Was the complication (amniotic fluid embolism resulting in death) a known risk of vaginal delivery, and was the standard of care employed to mitigate that risk during the labor and delivery?",
    answer:"YES",
    correct_note:"Amniotic fluid embolism is a recognized, documented risk of labor and delivery. It is listed in the informed consent for childbirth at most institutions. The mortality rate is documented in the literature at 80% or greater. The standard of care does not include specific prophylactic measures to prevent AFE, as no reliable preventive intervention exists. The team employed all appropriate monitoring and labor management protocols. The risk was known and the standard of care was employed.",
    incorrect_note:"This question has two parts: was it a known risk, and was the standard of care employed? Amniotic fluid embolism is a documented complication of labor and delivery. It is extremely rare and unpredictable, but it is known. More importantly, there are no standard of care interventions that can reliably prevent it. The team employed all appropriate monitoring and labor management. Both parts of this question point toward YES."
  },
  {
    text:"Was the complication identified in a timely manner?",
    answer:"YES",
    correct_note:"The team recognized the emergency immediately when the mother developed sudden respiratory distress and signs of DIC within two minutes of delivery. The response was activated without delay. The complication was identified as quickly as the clinical presentation allowed.",
    incorrect_note:"Looking at the event: the mother was on continuous monitoring and the team recognized the emergency the moment it presented. The activation of the response was immediate. The complication was identified in a timely manner, pointing toward YES."
  },
  {
    text:"Was the complication treated according to the standard of care, in a timely manner?",
    answer:"YES",
    correct_note:"The team activated the appropriate emergency response, initiated all available resuscitative interventions, and sustained comprehensive efforts. The standard of care for amniotic fluid embolism is aggressive supportive care; there is no targeted antidote or reversal. The team did everything that evidence-based medicine makes available. The fact that the patient did not survive does not mean the standard of care was not met: the mortality rate for AFE is 80% or greater even with optimal treatment.",
    incorrect_note:"Consider what the standard of care for AFE actually requires: aggressive supportive care, resuscitation, management of DIC, and sustained effort. There is no targeted therapy that reverses AFE. The team did everything available. The patient's death is consistent with the known mortality rate of this condition, not with a failure to treat appropriately. This points toward YES."
  }
];

function renderKctStep(){
  if(kctIndex>=KCT_QS.length){renderKctResult();return;}
  const q=KCT_QS[kctIndex];
  app.innerHTML=`${pb(1,2,"Known Complication Test &middot; Question "+(kctIndex+1)+" of 4")}<div class="card"><span class="step-label">Known Complication Test &middot; Question ${kctIndex+1} of 4</span><h3 class="case-title">Working Through the Known Complication Test</h3>${vign()}<div class="reference-box"><strong>Reminder:</strong> ALL four YES = Known Complication, not a safety event. ANY NO = safety event requiring further classification.</div><div class="question">${q.text}</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  ['YES','NO'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.style.flex="1 1 100px";btn.textContent=val;
    btn.onclick=()=>handleKct(btn,val,q);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleKct(btn,val,q){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  const isC=val===q.answer;
  btn.classList.add(isC?'selected-correct':'selected-redirect');
  if(!isC)document.querySelectorAll('#opts .opt-btn').forEach(b=>{if(b.textContent===q.answer)b.classList.add('selected-correct');});
  const fb=document.getElementById('fb');fb.classList.add('show',isC?'correct':'neutral');
  fb.innerHTML=`<span style="font-weight:700;">${isC?"That aligns with the evidence in the event.":"Let's think through this one together."}</span> ${isC?q.correct_note:q.incorrect_note}`;
  const nb=document.getElementById('nb');nb.classList.add('show');
  nb.onclick=()=>{kctIndex++;renderKctStep();};
}

function renderKctResult(){
  app.innerHTML=`${pb(1,2,"Known Complication Test &middot; Result")}<div class="card"><span class="step-label">Known Complication Test &middot; Result</span><h3 class="case-title">What Does This Tell Us?</h3><div class="feedback show correct"><span style="font-weight:700;">All four answers are YES.</span><br><br>When all four Known Complication Test answers are YES, the conclusion is clear: this outcome falls within the range of known complications of an indicated procedure, performed according to the standard of care, with timely identification and treatment. This is <strong>not a safety event.</strong><br><br>The Medical Staff Peer Review Committee's analysis supports this conclusion. They focused particularly on Questions 2 through 4. Amniotic fluid embolism was identified as an extremely rare and, in most cases, unpredictable complication with no known preventive intervention. This patient had no identifiable risk factors. Once the complication began, the team recognized it immediately and made all efforts to save her life. The literature documents a mortality rate of 80% or greater even with optimal treatment. The team's response was consistent with the standard of care.<br><br>The committee's determination: this was not a preventable patient safety event.</div><div class="nav-row"><button class="nav-btn show" id="nb">Continue to the Organizational Question</button></div></div>`;
  document.getElementById('nb').onclick=()=>{step="reflection";render();};
}

function renderReflection(){
  app.innerHTML=`${pb(2,2,"Organizational Reflection")}<div class="card"><span class="step-label">Closing Reflection</span><h3 class="case-title">What Does Your Organization Owe This Family?</h3>${vign()}<div class="feedback show outcome"><span style="font-weight:700;">This event is not a classifiable safety event.</span> The Known Complication Test was clear. The care was appropriate, the complication was unpredictable, the team responded correctly, and the outcome was consistent with the known mortality rate for amniotic fluid embolism. There is no SEC classification to assign. There is no sentinel event designation. There is no SAC Matrix to complete.<br><br>And yet: a 32-year-old woman came to your hospital to have a baby and did not go home.</div><div class="reference-box"><strong>The distinction between tragedy and preventable harm:</strong> Not every patient death in a healthcare setting is a safety event. Some deaths are the result of disease processes that remain beyond the reach of current medicine, even when everything is done correctly. Making this distinction is essential for two reasons. First, it protects the integrity of the safety event classification system: if everything that goes wrong is treated as a safety event, the system loses its ability to prioritize real prevention opportunities. Second, it protects the care team: holding clinicians accountable for outcomes that were genuinely unpreventable is a form of injustice that erodes the culture of psychological safety that patient safety depends on.</div><div class="question">Reflection: What does your organization owe this family, even though this event is not a classifiable safety event?</div><p style="font-size:.92rem;color:var(--dark-web-grey);margin:6px 0 14px;">There is no single correct answer. This reflection is about how you, as a future healthcare administrator, think about organizational responsibility in the face of tragedy that is not preventable.</p><textarea class="reflection-input" id="reflection-text" placeholder="Consider: communication with the family, support for the care team, institutional grief, disclosure obligations, and what it means to bear witness to tragedy with integrity..."></textarea><button class="submit-reflection" id="submit-reflection">Submit My Reflection</button><div class="feedback" id="reflection-fb"></div><div class="nav-row"><button class="nav-btn" id="nb">See Final Summary</button></div></div>`;

  document.getElementById('submit-reflection').onclick=()=>{
    const text=document.getElementById('reflection-text').value.trim();
    const fb=document.getElementById('reflection-fb');
    fb.classList.add('show','neutral');
    if(text.length<20){
      fb.innerHTML=`Take a moment with this question. There is no formula for what comes next, but there is an organizational responsibility. What does it look like in practice?`;
    } else {
      fb.innerHTML=`<span style="font-weight:700;">Your reflection has been recorded.</span> There are several dimensions many healthcare leaders identify when they encounter this question.<br><br><strong>Transparent, compassionate communication:</strong> The family deserves to know what happened, how the team responded, and that everything that could be done was done. Even when there is no error to disclose, there is an obligation to explain, to sit with the family, and to not let them wonder in silence about whether something went wrong.<br><br><strong>Support for the care team:</strong> The nurses, physicians, and staff who worked to save this mother will carry this experience. They did everything correctly and still watched a healthy young woman die. That is a profound psychological burden. The organization owes them acknowledgment, support, and a space to process what happened without being left to carry it alone.<br><br><strong>Institutional acknowledgment:</strong> A death that is not a safety event is still a death. Organizations that treat "not preventable" as the end of their responsibility miss the human dimension of care. A letter to the family, a debriefing for the team, and a transparent conversation about what happened are not admissions of fault: they are expressions of the organization's commitment to the people it serves, even when the outcome was beyond its control.<br><br><strong>Connection to disclosure policy:</strong> Your organization's disclosure policy likely addresses how to communicate with families after unexpected outcomes, including those that are not classified as safety events. Knowing that policy, and knowing how to activate it with compassion and clarity, is part of your leadership responsibility.`;
      document.getElementById('submit-reflection').disabled=true;
      document.getElementById('nb').classList.add('show');
    }
  };
}

function renderSummary(){
  app.innerHTML=`<div class="card" style="text-align:center;"><span class="step-label">Case 15 Complete</span><h3 class="case-title">Known Complication Test Result</h3><div class="not-a-safety-event">Not a Safety Event</div><table class="summary-table" style="text-align:left;"><tr><th>Discussion Point</th><th>Conclusion</th></tr><tr><td>Taxonomy Event Type</td><td>N/A &mdash; Not a Safety Event</td></tr><tr><td>Known Complication Test</td><td>All four answers YES: procedure appropriate; complication known and unpreventable; team identified emergency immediately; team treated according to standard of care</td></tr><tr><td>Was this a safety event?</td><td>No &mdash; amniotic fluid embolism is an extremely rare, unpredictable complication with no known preventive intervention; mortality rate 80% or greater even with optimal treatment</td></tr><tr><td>SEC Classification</td><td>Not applicable &mdash; event does not meet the threshold for safety event classification</td></tr><tr><td>Sentinel event per JC?</td><td>Not applicable &mdash; not a safety event</td></tr><tr><td>SAC Matrix</td><td>Not applicable &mdash; not a safety event</td></tr></table><div class="feedback show neutral" style="text-align:left;margin-top:20px;"><span style="font-weight:700;">Why this case is here.</span> You have now worked through 15 cases. In 14 of them, there was a safety event: a deviation from GAPS, a harm that reached a patient, a systemic failure that needed analysis and response. This case is here because your ability to recognize what is NOT a safety event is as important as your ability to classify what is.<br><br>A healthcare administrator who treats every bad outcome as a preventable error will exhaust resources on events that cannot be improved through system change, erode the psychological safety of care teams who are held accountable for unpreventable outcomes, and dilute the attention and energy that should be focused on genuinely preventable harm. Knowing where the boundary is, and being able to explain it to a family, a medical staff committee, an accreditation reviewer, and your own leadership team, is a core competency for the work you are entering.<br><br>The distinction between tragedy and preventable harm is not a legal defense. It is a clinical and ethical commitment to honesty about what healthcare can and cannot do, and to directing improvement efforts where they can actually make a difference.</div><p class="small-note">References: HPI SEC &amp; SSER Patient Safety Measurement System; Known Complication Test; Medical Staff Peer Review framework</p><button class="restart-btn" id="rb">Restart Case 15</button></div>`;
  document.getElementById('rb').onclick=()=>{kctIndex=0;step="intro";render();};
}

function render(){
  if(step==="intro")renderIntro();
  else if(step==="kct-intro")renderKctIntro();
  else if(step==="kct")renderKctStep();
  else if(step==="reflection")renderReflection();
  else if(step==="summary")renderSummary();
}
render();
</script>
