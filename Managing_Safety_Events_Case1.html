<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Managing Safety Events: Case 1</title>
<style>
  :root {
    --edgewood-red: #BB0000;
    --black: #000000;
    --white: #FFFFFF;
    --dark-gold: #C8932B;
    --warm-grey: #F0EEEB;
    --dark-web-grey: #58595B;
    --slate-blue: #5794AD;
    --light-grey: #C2C6C8;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Source Sans Pro', Arial, sans-serif;
    background: var(--warm-grey);
    color: var(--black);
    margin: 0;
    padding: 0;
    line-height: 1.6;
  }
  .wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  header {
    background: var(--black);
    color: var(--white);
    padding: 28px 20px;
    text-align: center;
  }
  header h1 {
    font-family: 'Spectral', Georgia, serif;
    margin: 0 0 6px;
    font-size: 1.7rem;
    letter-spacing: 0.5px;
  }
  header p {
    margin: 0;
    color: var(--light-grey);
    font-size: 0.95rem;
  }
  .accent-bar { height: 6px; background: var(--edgewood-red); }

  .card {
    background: var(--white);
    border: 1px solid var(--light-grey);
    border-radius: 6px;
    padding: 24px;
    margin-top: 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    margin-bottom: 4px;
    font-size: 0.9rem;
    color: var(--dark-web-grey);
  }
  .progress-bar-bg {
    background: var(--light-grey);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .progress-bar-fill {
    background: var(--edgewood-red);
    height: 100%;
    transition: width 0.3s ease;
  }

  .step-label {
    display: inline-block;
    background: var(--dark-gold);
    color: var(--white);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 3px;
    margin-bottom: 12px;
  }

  .case-title {
    font-family: 'Spectral', Georgia, serif;
    font-size: 1.4rem;
    margin: 0 0 14px;
    color: var(--black);
  }

  .vignette {
    background: var(--warm-grey);
    border-left: 4px solid var(--slate-blue);
    padding: 16px 18px;
    border-radius: 4px;
    margin-bottom: 18px;
    font-size: 1rem;
  }

  .intro-text {
    font-size: 1.05rem;
    margin-bottom: 16px;
  }
  .intro-text p { margin: 0 0 12px; }

  .question {
    font-weight: 700;
    margin-bottom: 4px;
    font-size: 1.05rem;
  }
  .helper-text {
    font-size: 0.92rem;
    color: var(--dark-web-grey);
    margin: 6px 0 14px;
  }

  .reference-box {
    background: var(--warm-grey);
    border: 1px solid var(--light-grey);
    border-radius: 4px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 0.88rem;
    color: var(--dark-web-grey);
  }
  .reference-box strong { color: var(--black); }
  .reference-box ul { margin: 8px 0 0; padding-left: 18px; }
  .reference-box li { margin-bottom: 4px; }

  .info-box {
    background: #fff8e6;
    border: 1px solid var(--dark-gold);
    border-left: 4px solid var(--dark-gold);
    border-radius: 4px;
    padding: 14px 16px;
    margin: 16px 0;
    font-size: 0.95rem;
  }
  .info-box strong { display: block; margin-bottom: 4px; color: var(--dark-gold); }

  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 12px;
  }
  .opt-btn {
    flex: 1 1 220px;
    background: var(--white);
    border: 2px solid var(--slate-blue);
    color: var(--black);
    font-family: inherit;
    font-size: 0.98rem;
    font-weight: 600;
    padding: 14px 18px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
  }
  .opt-btn:hover { background: var(--slate-blue); color: var(--white); }
  .opt-btn.selected-correct {
    background: #2e7d32;
    border-color: #2e7d32;
    color: var(--white);
  }
  .opt-btn.selected-redirect {
    background: var(--edgewood-red);
    border-color: var(--edgewood-red);
    color: var(--white);
  }
  .opt-btn:disabled { cursor: default; opacity: 1; }
  .opt-btn:disabled:not(.selected-correct):not(.selected-redirect) {
    opacity: 0.45;
  }

  .feedback {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 5px;
    font-size: 0.97rem;
    display: none;
  }
  .feedback.show { display: block; animation: fadein 0.25s ease; }
  .feedback.correct {
    background: #eaf5ea;
    border-left: 4px solid #2e7d32;
  }
  .feedback.redirect {
    background: #fdeaea;
    border-left: 4px solid var(--edgewood-red);
  }
  .feedback.neutral {
    background: var(--warm-grey);
    border-left: 4px solid var(--slate-blue);
  }
  .feedback strong { display: block; margin-bottom: 6px; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .nav-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 22px;
  }
  .nav-btn {
    background: var(--edgewood-red);
    color: var(--white);
    border: none;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 5px;
    cursor: pointer;
    display: none;
  }
  .nav-btn.show { display: inline-block; }
  .nav-btn:hover { background: #930000; }
  .nav-btn.secondary {
    background: var(--dark-web-grey);
  }
  .nav-btn.secondary:hover { background: #404142; }

  .summary-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 0.92rem;
  }
  .summary-table th, .summary-table td {
    border: 1px solid var(--light-grey);
    padding: 8px 10px;
    text-align: left;
  }
  .summary-table th {
    background: var(--black);
    color: var(--white);
    font-family: 'Spectral', Georgia, serif;
    font-weight: 600;
  }
  .summary-table tr:nth-child(even) td { background: var(--warm-grey); }

  .start-screen, .end-screen {
    text-align: center;
  }
  .start-screen h2, .end-screen h2 {
    font-family: 'Spectral', Georgia, serif;
    color: var(--black);
  }

  .case-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 22px 0;
  }
  .case-grid button {
    background: var(--white);
    border: 2px solid var(--edgewood-red);
    color: var(--edgewood-red);
    font-family: inherit;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 14px 10px;
    border-radius: 5px;
    cursor: pointer;
    width: 80px;
  }
  .case-grid button:hover { background: var(--edgewood-red); color: var(--white); }
  .case-grid button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .restart-btn {
    background: transparent;
    border: 2px solid var(--dark-web-grey);
    color: var(--dark-web-grey);
    font-family: inherit;
    font-weight: 700;
    padding: 10px 22px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 18px;
  }
  .restart-btn:hover { background: var(--dark-web-grey); color: var(--white); }

  .small-note {
    font-size: 0.85rem;
    color: var(--dark-web-grey);
    margin-top: 18px;
    text-align: center;
  }

  .score-badge {
    display: inline-block;
    background: var(--edgewood-red);
    color: var(--white);
    font-family: 'Spectral', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 6px;
    margin: 14px 0;
  }

/* ── Resource Page Header ── */

/* ── Resource Page Footer ── */
.resource-footer {

<body>
<header class="resource-header">
    <img class="resource-header-logo" src="eu_logo_primary.jpg" alt="Edgewood University">
    <div class="resource-header-text">
        <div class="resource-header-course">HCA 680: Patient Safety and Risk</div>
        <div class="resource-header-title">Case 1: Fall with Hip Fracture</div>
    </div>
    <a class="resource-header-back" href="Managing_Safety_Events_Index.html">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Safety Event Management Cases
    </a>
</header>


<div class="accent-bar"></div>

<div class="wrap">
  <div id="app"></div>
</div>

<script>
// =================================================================
// CASE 1 DATA
// =================================================================
const VIGNETTE = "A patient was admitted with heart failure and received multiple medications, some of which were reported to cause dizziness and sleepiness. A fall risk assessment was completed, and the patient was identified as high risk of harm if they fall. The Fall Prevention interventions, including bed alarms, patient education, yellow socks, and rounding procedures, were implemented consistently. The family was visiting and decided to leave and get some dinner. Shortly thereafter, the patient got out of bed to go to the bathroom. The patient fell and complained of intense hip and leg pain. Evaluation determines that the patient had a hip fracture as a result of this fall, requiring surgical repair and rehabilitation therapy. The nurse found the bed alarm off and learned that the family had turned it off because it kept going off and didn't think to put it back on when they left the patient alone.";

const MANAGER_UPDATE = "Per the surgeon's discharge note, the patient will not be able to bend their knee and will require device assistance from baseline.";

// Step state
let step = "intro"; // intro -> deviation -> kct -> deviation (loop) -> reach -> harm-info -> harm-level -> csa -> summary
let requestedInfo = null; // true/false
let kctVisited = false;

// CSA step state
let sentinelAnswer = null;
let sentinelCriteriaShown = false;
let sacSeverity = null;
let sacProbability = null;

const app = document.getElementById('app');
const _caseStartTime = new Date();
let _attemptLog = [];       // responses for current attempt
let _lastAttemptSnapshot = null; // captured on summary render
let _allAttempts = [];      // completed attempts (pushed on restart)
let _attemptStartTime = new Date(); // resets on each restart

// Two-stage response logger
// Stage 1: called at top of handler to capture what was selected
var _pendingSelected = '';
function _captureSelected(btn) {
  _pendingSelected = btn.textContent.trim();
}
// Stage 2: called after feedback innerHTML is set, captures full feedback text
function _logResponse(stepName, feedbackElId) {
  var alreadyLogged = _attemptLog.some(function(r){ return r.step === stepName; });
  if (alreadyLogged) return;
  var fbText = '';
  var el = document.getElementById(feedbackElId || 'feedback');
  if (el) fbText = el.innerText || el.textContent || '';
  _attemptLog.push({ step: stepName, selected: _pendingSelected, feedback: fbText.trim() });
}

// -----------------------------------------------------------------
// INTRO
// -----------------------------------------------------------------
function renderIntro() {
  app.innerHTML = `
    <div class="card">
      <span class="step-label">Case 1</span>
      <div class="intro-text">
        <p>You have been trained to review safety events reported by employees at your organization. You've got your toolkit and you're ready to get to work.</p>
        <p>You open the first event and have to decide if it is a safety event. If so, you'll need to score it. Let's begin.</p>
      </div>
      ${renderVignette()}
      <div class="nav-row">
        <button class="nav-btn show" id="next-btn">Begin Discussion</button>
      </div>
    </div>
  `;
  document.getElementById('next-btn').onclick = () => {
    step = "deviation";
    render();
  };
}

function renderVignette() {
  return `<div class="vignette"><strong>The Event:</strong> ${VIGNETTE}</div>`;
}

function progressBar(stepNum, totalSteps, label) {
  const pct = Math.round((stepNum / totalSteps) * 100);
  return `
    <div class="progress-row">
      <span>${label}</span>
      <span>Step ${stepNum} of ${totalSteps}</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
  `;
}

// -----------------------------------------------------------------
// STEP 1: DEVIATION IDENTIFICATION
// -----------------------------------------------------------------
const DEVIATION_OPTIONS = [
  {
    key: "alarm",
    label: "The bed alarm was turned off by the family and not turned back on before they left the patient alone",
    type: "main"
  },
  {
    key: "education",
    label: "The family was not educated about the importance of the bed alarm",
    type: "secondary"
  },
  {
    key: "assessment",
    label: "The fall risk assessment was not completed",
    type: "factually-incorrect"
  },
  {
    key: "interventions",
    label: "The fall prevention interventions were not implemented",
    type: "factually-incorrect"
  },
  {
    key: "none",
    label: "There was no deviation in Generally Accepted Performance Standards (GAPS)",
    type: "no-gaps"
  }
];

function renderDeviationStep() {
  app.innerHTML = `
    ${progressBar(1, 4, "Discussion Point 1: Identifying Deviations")}
    <div class="card">
      <span class="step-label">Step 1 of 4</span>
      <h3 class="case-title">Were There Any Deviations?</h3>
      ${renderVignette()}
      <div class="question">Was there a deviation from Generally Accepted Performance Standards (GAPS) in this event? If so, where? Was there more than one?</div>
      <div class="helper-text">Review the event again and select the option below that best represents the <em>main</em> deviation, the one most directly and causally connected to what happened to the patient.</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-row"><button class="nav-btn" id="next-btn">Continue</button></div>
    </div>
  `;
  const optionsDiv = document.getElementById('options');
  DEVIATION_OPTIONS.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.label;
    btn.onclick = () => handleDeviationAnswer(btn, opt, optionsDiv);
    optionsDiv.appendChild(btn);
  });
}

function handleDeviationAnswer(btn, opt, optionsDiv) {
  const allBtns = optionsDiv.querySelectorAll('button');
  allBtns.forEach(b => b.disabled = true);
  _captureSelected(btn);

  const feedbackDiv = document.getElementById('feedback');
  feedbackDiv.classList.add('show');
  const nextBtn = document.getElementById('next-btn');

  if (opt.type === "main") {
    btn.classList.add('selected-correct');
    feedbackDiv.classList.add('correct');
    feedbackDiv.innerHTML = `
      <strong>You have identified the proximate deviation in this event.</strong>
      The bed alarm was turned off and never restored before the patient was left alone, and that is the issue most directly tied to what happened next.
      <br><br>
      Now let's think about causation for a moment. Is there a clear relationship between this deviation and the harm the patient experienced? The patient had been identified as high fall risk, and the bed alarm was a specifically prescribed safeguard in the fall prevention plan. When that alarm was off and the family left, the system had no way to alert staff that a high-risk patient was attempting to get up unassisted. That gap came immediately before the fall, which makes it causal, not just coincidental.
    `;
  _logResponse('Discussion Point 1: Deviation', 'feedback');
    nextBtn.classList.add('show');
    nextBtn.textContent = "Continue to Discussion Point 2";
    nextBtn.onclick = () => { step = "reach"; render(); };

  } else if (opt.type === "secondary") {
    btn.classList.add('selected-redirect');
    feedbackDiv.classList.add('neutral');
    feedbackDiv.innerHTML = `
      <strong>That is one way to view this event.</strong>
      Family education is worth noting, and in a fuller event review it would likely surface as a contributing factor, one of several holes in the swiss cheese.
      <br><br>
      Have you thought about whether there is a more proximate deviation, something that happened directly before the fall, with a clearer causal connection to the harm? Take another look at the options and consider what was in place, and what was not, in the moments just before the patient got up.
    `;
  _logResponse('Discussion Point 1: Deviation', 'feedback');
    nextBtn.classList.add('show');
    nextBtn.textContent = "Try Again";
    nextBtn.onclick = () => { renderDeviationStep(); };

  } else if (opt.type === "factually-incorrect") {
    btn.classList.add('selected-redirect');
    feedbackDiv.classList.add('neutral');
    let detail = "";
    if (opt.key === "assessment") {
      detail = "Looking back at the event: a fall risk assessment <em>was</em> completed, and the patient was identified as high risk.";
    } else {
      detail = "Looking back at the event: the fall prevention interventions, including bed alarms, patient education, yellow socks, and rounding, <em>were</em> implemented consistently.";
    }
    feedbackDiv.innerHTML = `
      <strong>Let's go back to the event together.</strong>
      ${detail}
      <br><br>
      Since that step was completed as expected, it is not the gap we are looking for here. Have you thought about what changed <em>after</em> those safeguards were in place? Something shifted between the time the interventions were set up and the moment the patient fell. Take another look at the options with that in mind.
    `;
  _logResponse('Discussion Point 1: Deviation', 'feedback');
    nextBtn.classList.add('show');
    nextBtn.textContent = "Try Again";
    nextBtn.onclick = () => { renderDeviationStep(); };

  } else if (opt.type === "no-gaps") {
    btn.classList.add('selected-redirect');
    feedbackDiv.classList.add('neutral');
    feedbackDiv.innerHTML = `
      <strong>Let's explore that conclusion together before we settle on it.</strong>
      One useful tool when we are uncertain whether a GAPS deviation exists is the <strong>Known Complication Test</strong>. If the answer to all four questions is YES, the event is considered a known complication rather than a safety event. If the answer to any one of them is NO, we are looking at a safety event. Let's work through those questions and see where this case lands.
    `;
  _logResponse('Discussion Point 1: Deviation', 'feedback');
    nextBtn.classList.add('show');
    nextBtn.textContent = "Apply the Known Complication Test";
    nextBtn.onclick = () => { kctVisited = true; step = "kct"; render(); };
  }
}

// -----------------------------------------------------------------
// KNOWN COMPLICATION TEST (only reached if "no deviation" selected)
// -----------------------------------------------------------------
const KCT_QUESTIONS = [
  {
    text: "Was the procedure, treatment, or test (in this case, the patient getting up to use the bathroom while unsupervised) appropriate or warranted based on nationally recognized standards of care for a high fall-risk patient?",
    answer: "NO"
  },
  {
    text: "Was the complication (a fall resulting in hip fracture) a known risk, and was the standard of care employed to mitigate that risk at the time the patient got up?",
    answer: "NO"
  },
  {
    text: "Was the complication identified in a timely manner?",
    answer: "YES"
  },
  {
    text: "Was the complication treated according to the standard of care, in a timely manner?",
    answer: "YES"
  }
];

let kctIndex = 0;

function renderKctStep() {
  if (kctIndex >= KCT_QUESTIONS.length) {
    renderKctResult();
    return;
  }
  const q = KCT_QUESTIONS[kctIndex];
  app.innerHTML = `
    ${progressBar(1, 4, "Discussion Point 1: Known Complication Test")}
    <div class="card">
      <span class="step-label">Known Complication Test &middot; Question ${kctIndex + 1} of 4</span>
      <h3 class="case-title">Is This a Known Complication or a Safety Event?</h3>
      ${renderVignette()}
      <div class="reference-box">
        <strong>Reminder:</strong> If the answer to ALL four questions is YES, the event is a Known Complication, not a safety event. If the answer to ANY question is NO, the event is a safety event.
      </div>
      <div class="question">${q.text}</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-row"><button class="nav-btn" id="next-btn">Continue</button></div>
    </div>
  `;
  const optionsDiv = document.getElementById('options');
  ['YES', 'NO'].forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.style.flex = "1 1 100px";
    btn.textContent = val;
    btn.onclick = () => handleKctAnswer(btn, val, q, optionsDiv);
    optionsDiv.appendChild(btn);
  });
}

function handleKctAnswer(btn, selected, q, optionsDiv) {
  const allBtns = optionsDiv.querySelectorAll('button');
  allBtns.forEach(b => b.disabled = true);
  _captureSelected(btn);

  const isCorrect = selected === q.answer;
  if (isCorrect) {
    btn.classList.add('selected-correct');
  } else {
    btn.classList.add('selected-redirect');
    allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('selected-correct'); });
  }

  const feedbackDiv = document.getElementById('feedback');
  feedbackDiv.classList.add('show');
  feedbackDiv.classList.add(isCorrect ? 'correct' : 'neutral');

  let note = "";

      <span style="font-weight:700;">Let's look at the criteria more closely.</span> A patient who sustained a hip fracture requiring surgical repair, who will not regain knee flexion, and who requires permanent device assistance represents more than a moderate or minor outcome. Work back through the severity definitions and consider which category best captures what happened to this patient.
    `;
  _logResponse('Discussion Point 4: SAC Severity', 'feedback');
    allBtns.forEach(b => { b.disabled = false; });
    btn.disabled = true;
  }
}

function showProbabilitySection() {
  const section = document.getElementById('probability-section');
  section.style.display = 'block';

  const probOptions = document.getElementById('probability-options');
  [
    { val: 'frequent', label: 'Frequent (several times per year)' },
    { val: 'occasional', label: 'Occasional (several times in 1 to 2 years)' },
    { val: 'uncommon', label: 'Uncommon (sometime in 2 to 5 years)' },
    { val: 'remote', label: 'Remote (sometime in 5 to 30 years)' }
  ].forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.label;
    btn.onclick = () => handleProbabilityAnswer(btn, opt.val, probOptions);
    probOptions.appendChild(btn);
  });
}

function handleProbabilityAnswer(btn, val, probOptions) {
  const allBtns = probOptions.querySelectorAll('button');
  allBtns.forEach(b => { b.disabled = true; });
  _captureSelected(btn);
  sacProbability = val;
  btn.classList.add('selected-correct');

  const feedbackDiv = document.getElementById('probability-feedback');
  feedbackDiv.classList.add('show', 'neutral');

  let probNote = '';
  if (val === 'occasional') {
    probNote = 'Occasional aligns with the scenario context provided: this type of event occurs several times in a 1 to 2 year period at your organization.';
  } else if (val === 'frequent') {
    probNote = 'Frequent would mean this type of event occurs several times per year. The scenario context suggests Occasional is a closer fit, but the SAC score outcome is the same at Catastrophic severity regardless.';
  } else {
    probNote = 'The scenario context suggests Occasional is the closer fit for this organization. That said, note that at Catastrophic severity, the SAC score is 3 regardless of probability category.';
  }

  feedbackDiv.innerHTML = `<span style="font-weight:700;">Probability noted.</span> ${probNote}`;
  _logResponse('Discussion Point 4: SAC Probability', 'feedback');

  // Show matrix result
  showMatrixResult();
}

function showMatrixResult() {
  const resultDiv = document.getElementById('matrix-result');
  resultDiv.style.display = 'block';

  const sacScore = 3; // Catastrophic always = 3 regardless of probability

  resultDiv.innerHTML = `
    <div class="reference-box" style="border-left:4px solid var(--edgewood-red);">
      <strong>SAC Matrix Result: Score of 3 (Highest Risk)</strong><br><br>
      Catastrophic severity paired with any probability category produces a SAC score of 3. A score of 3 indicates that a comprehensive systematic analysis is warranted and organizational resources should be allocated to conduct one.
      <br><br>
      <table class="summary-table" style="margin-top:8px; font-size:0.85rem;">
        <tr><th></th><th>Catastrophic</th><th>Major</th><th>Moderate</th><th>Minor</th></tr>
        <tr><td><strong>Frequent</strong></td><td style="background:#fdeaea; font-weight:700; text-align:center;">3</td><td style="text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td></tr>
        <tr><td><strong>Occasional</strong></td><td style="background:#fdeaea; font-weight:700; text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr>
        <tr><td><strong>Uncommon</strong></td><td style="background:#fdeaea; font-weight:700; text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr>
        <tr><td><strong>Remote</strong></td><td style="background:#fdeaea; font-weight:700; text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr>
      </table>
    </div>
    <div class="feedback show neutral" style="margin-top:16px;">
      <span style="font-weight:700;">One more thing to keep in mind before moving on.</span> The SAC Matrix is a useful tool for guiding resource allocation decisions, but it operates alongside, not instead of, organizational policy and accreditation requirements. Your organization's own policies may define additional thresholds for when a CSA is required. For Joint Commission-accredited organizations, this event independently triggers a CSA requirement as a sentinel event. Always verify what your accreditation body and internal policies require, and use the matrix to help determine the appropriate scope and urgency of the response.
    </div>
  `;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.add('show');
  nextBtn.textContent = "See Final Summary";
  nextBtn.onclick = () => { step = "summary"; render(); };
}

// -----------------------------------------------------------------
// FINAL SUMMARY
// -----------------------------------------------------------------
function renderSummary() {
  // Snapshot attempt data NOW before any UI changes or restarts can clear it
  const _currentAttemptSnapshot = _buildAttemptLog();
  _lastAttemptSnapshot = _currentAttemptSnapshot;
  const finalScore = requestedInfo ? "SSE 2 &mdash; Severe Permanent Harm" : "SSE 4 &mdash; Severe Temporary Harm";
  const scoreShort = requestedInfo ? "SSE 2" : "SSE 4";

  app.innerHTML = `
    ${progressBar(5, 5, "Final Summary")}
    <div class="card end-screen">
      <span class="step-label">Case 1 Complete</span>
      <h3 class="case-title">Final SEC Classification</h3>
      <div class="score-badge">${scoreShort}</div>
      <p>${finalScore}</p>
      <table class="summary-table">
        <tr><th>Discussion Point</th><th>Conclusion</th></tr>
<tr><td>Taxonomy Event Type</td><td>EE3 &mdash; Fall (Environmental); Inpatient Medical-Surgical</td></tr>
        <tr><td>Deviation from GAPS?</td><td>Yes &mdash; bed alarm turned off and not restored before the patient was left unsupervised</td></tr>
        <tr><td>Did the deviation reach the patient?</td><td>Yes &mdash; no barrier intervened before the fall</td></tr>
        <tr><td>Additional information requested?</td><td>${requestedInfo ? "Yes" : "No"}</td></tr>
        <tr><td>Level of harm</td><td>${finalScore}</td></tr>
        <tr><td>SEC Classification</td><td>Serious Safety Event</td></tr>
        <tr><td>Sentinel event per JC?</td><td>Yes &mdash; fall resulting in fracture and surgical repair meets JC criteria (July 2026)</td></tr>
        <tr><td>SAC Matrix score</td><td>3 (Catastrophic severity, any probability) &mdash; CSA warranted</td></tr>
      </table>
      ${!requestedInfo ? `
      <div class="feedback show neutral" style="text-align:left; margin-top:20px;">
        <strong>Something worth reflecting on as you close this case.</strong>
        Because no additional information was requested, this event was scored as SSE 4 based on what was documented at the time. In practice, the manager's update, that the patient will not regain knee flexion and will require permanent device assistance, would shift this classification to SSE 2: Severe Permanent Harm. This is a good illustration of why gathering complete information before finalizing a score matters. The same event can land in a different category depending on what the reviewer knows, and that difference has real implications for the response the organization is obligated to provide.
      </div>` : ''}
      <button class="restart-btn" id="restart-btn">Restart Case 1</button>
    </div>
  `;
  
  // Send completion data to parent shell
  // Use pre-captured snapshot so restart cannot clear the data before this fires
  var _snapshotToSend = _currentAttemptSnapshot;
  var _allToSend = _allAttempts.concat([_snapshotToSend]);
  setTimeout(function(){
    window.parent.postMessage({
      type: 'case-complete',
      caseNum: 1,
      log: _snapshotToSend,
      attempts: _allToSend
    }, '*');
  }, 100);
  document.getElementById('restart-btn').onclick = () => {
    // Save completed attempt before resetting
    // Use the pre-captured snapshot (safe even if _attemptLog already reset)
    if (_lastAttemptSnapshot) { _allAttempts.push(_lastAttemptSnapshot); _lastAttemptSnapshot = null; }
    _attemptLog = [];
    _attemptStartTime = new Date();
    requestedInfo = null;
    kctVisited = false;
    kctIndex = 0;
    sentinelAnswer = null;
    sentinelCriteriaShown = false;
    sacSeverity = null;
    sacProbability = null;
    step = "intro";
    render();
  };
}


function _buildAttemptLog() {
  var endTime = new Date();
  var elapsed = Math.round((endTime - _attemptStartTime) / 1000);
  var mins = Math.floor(elapsed / 60);
  var secs = elapsed % 60;
  return {
    finalClassification: 'SSE 2 or SSE 4 (path-dependent on manager update)',
    taxonomyEventType: 'EE3 — Fall (Environmental)',
    managerUpdateRequested: requestedInfo ? 'Yes' : 'No',
    sentinelEvent: sentinelAnswer === 'yes' ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable',
    sacSeverity: sacSeverity || 'Not applicable',
    sacProbability: sacProbability || 'Not applicable',
    startTime: _attemptStartTime.toLocaleString(),
    endTime: endTime.toLocaleString(),
    timeOnTask: mins + ' min ' + secs + ' sec',
    responses: _attemptLog.slice()
  };
}

// -----------------------------------------------------------------
// ROUTER
// -----------------------------------------------------------------
function render() {
  if (step === "intro") renderIntro();
  else if (step === "deviation") renderDeviationStep();
  else if (step === "kct") { kctIndex = 0; renderKctStep(); }
  else if (step === "reach") renderReachStep();
  else if (step === "harm-info") renderHarmInfoStep();
  else if (step === "harm-level") renderHarmLevelStep();
  else if (step === "csa") renderCsaSentinelStep();
  else if (step === "summary") renderSummary();
}

render();
</script>
</body>
</html>
