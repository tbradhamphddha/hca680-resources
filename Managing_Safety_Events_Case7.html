  .question{font-weight:700;margin-bottom:4px;font-size:1.05rem;}
  .helper-text{font-size:.92rem;color:var(--dark-web-grey);margin:6px 0 14px;}
  .reference-box{background:var(--warm-grey);border:1px solid var(--light-grey);border-radius:4px;padding:12px 16px;margin-bottom:16px;font-size:.88rem;color:var(--dark-web-grey);}
  .reference-box strong{color:var(--black);}
  .reference-box ul{margin:8px 0 0;padding-left:18px;}
  .reference-box li{margin-bottom:4px;}
  .info-box{background:#fff8e6;border:1px solid var(--dark-gold);border-left:4px solid var(--dark-gold);border-radius:4px;padding:14px 16px;margin:16px 0;font-size:.95rem;}
  .info-box strong{display:block;margin-bottom:4px;color:var(--dark-gold);}
  .options{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;}
  .opt-btn{flex:1 1 220px;background:var(--white);border:2px solid var(--slate-blue);color:var(--black);font-family:inherit;font-size:.98rem;font-weight:600;padding:14px 18px;border-radius:5px;cursor:pointer;transition:all .15s ease;text-align:left;}
  .opt-btn:hover{background:var(--slate-blue);color:var(--white);}
  .opt-btn.selected-correct{background:#2e7d32;border-color:#2e7d32;color:var(--white);}
  .opt-btn.selected-redirect{background:var(--edgewood-red);border-color:var(--edgewood-red);color:var(--white);}
  .opt-btn:disabled{cursor:default;opacity:1;}
  .opt-btn:disabled:not(.selected-correct):not(.selected-redirect){opacity:.45;}
  .feedback{margin-top:18px;padding:16px 18px;border-radius:5px;font-size:.97rem;display:none;}
  .feedback.show{display:block;animation:fadein .25s ease;}
  .feedback.correct{background:#eaf5ea;border-left:4px solid #2e7d32;}
  .feedback.neutral{background:var(--warm-grey);border-left:4px solid var(--slate-blue);}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .nav-row{display:flex;justify-content:flex-end;margin-top:22px;}
  .nav-btn{background:var(--edgewood-red);color:var(--white);border:none;font-family:inherit;font-size:1rem;font-weight:700;padding:12px 28px;border-radius:5px;cursor:pointer;display:none;}
  .nav-btn.show{display:inline-block;}
  .nav-btn:hover{background:#930000;}
  .summary-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.92rem;}
  .summary-table th,.summary-table td{border:1px solid var(--light-grey);padding:8px 10px;text-align:left;}
  .summary-table th{background:var(--black);color:var(--white);font-family:'Spectral',Georgia,serif;font-weight:600;}
  .summary-table tr:nth-child(even) td{background:var(--warm-grey);}
  .score-badge{display:inline-block;background:var(--edgewood-red);color:var(--white);font-family:'Spectral',Georgia,serif;font-size:1.6rem;font-weight:700;padding:14px 28px;border-radius:6px;margin:14px 0;}
  .small-note{font-size:.85rem;color:var(--dark-web-grey);margin-top:18px;text-align:center;}
  .restart-btn{background:transparent;border:2px solid var(--dark-web-grey);color:var(--dark-web-grey);font-family:inherit;font-weight:700;padding:10px 22px;border-radius:5px;cursor:pointer;margin-top:18px;}
  .restart-btn:hover{background:var(--dark-web-grey);color:var(--white);}

    <img class="resource-header-logo" src="eu_logo_primary.jpg" alt="Edgewood University">

<div class="accent-bar"></div>
<div class="wrap"><div id="app"></div></div>
<script>
const VIGNETTE = "A 47-year-old patient is scheduled for a laparoscopic cholecystectomy. The OR team is running behind schedule due to two prior cases running longer than planned. The circulating nurse initiates the time-out, but the surgeon, who has already begun positioning the patient, talks through it without pausing. Two team members are not present when the time-out is called: the scrub tech is retrieving equipment from the supply room, and the anesthesiologist is at the medication cart. The time-out is documented in the electronic health record as complete. The procedure begins without confirmation of the correct patient identity, the correct procedure, or antibiotic prophylaxis administration. Antibiotics had not in fact been administered. The patient develops a surgical site infection requiring readmission, intravenous antibiotics, and wound debridement. The patient recovers fully with no permanent sequelae.";
const MANAGER_UPDATE = "Per the perioperative services manager's follow-up, the patient completed a full course of IV antibiotics and underwent wound debridement during the readmission. No permanent complications are documented and the patient has returned to baseline. A review of OR records for the week of the event shows that four of the seven time-outs conducted were documented as complete while team members were not all present or the surgeon was still actively engaged in another task. This was not identified or addressed in real time.";

let step="intro",requestedInfo=null,kctIndex=0,sentinelAnswer=null,sacSeverity=null,sacProbability=null;
const app=document.getElementById('app');
const _caseStartTime = new Date();
let _attemptLog = [];
let _allAttempts = [];
let _lastAttemptSnapshot = null;
let _attemptStartTime = new Date();
var _pendingSelected = '';

function _captureSelected(btn) {
  _pendingSelected = btn.textContent.trim();
}

function _logResponse(stepName, fbHTML) {
  var alreadyLogged = _attemptLog.some(function(r){ return r.step === stepName; });
  if (alreadyLogged) return;
  var div = document.createElement('div');
  div.innerHTML = fbHTML || '';
  var cleanText = (div.textContent || div.innerText || '').trim();
  _attemptLog.push({ step: stepName, selected: _pendingSelected, feedback: cleanText });
}

function _buildAttemptLog() {
  var endTime = new Date();
  var elapsed = Math.round((endTime - _attemptStartTime) / 1000);
  var mins = Math.floor(elapsed / 60);
  var secs = elapsed % 60;
  return {
    finalClassification: 'SSE 5 — Moderate Temporary Harm',
    taxonomyEventType: 'PR3 — Wrong Procedure / Universal Protocol Failure (Procedural); Inpatient OR',
    managerUpdateRequested: (typeof requestedInfo !== 'undefined' && requestedInfo) ? 'Yes' : 'No',
    sentinelEvent: (typeof sentinelAnswer !== 'undefined') ? (sentinelAnswer === 'yes' ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable') : 'Not applicable',
    sacSeverity: (typeof sacSeverity !== 'undefined' && sacSeverity) ? sacSeverity : 'Not applicable',
    sacProbability: (typeof sacProbability !== 'undefined' && sacProbability) ? sacProbability : 'Not applicable',
    startTime: _attemptStartTime.toLocaleString(),
    endTime: endTime.toLocaleString(),
    timeOnTask: mins + ' min ' + secs + ' sec',
    responses: _attemptLog.slice()
  };
}


function vign(){return `<div class="vignette"><strong>The Event:</strong> ${VIGNETTE}</div>`;}
function pb(n,t,l){return `<div class="progress-row"><span>${l}</span><span>Step ${n} of ${t}</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round(n/t*100)}%;"></div></div>`;}

function renderIntro(){
  app.innerHTML=`<div class="card"><span class="step-label">Case 7</span><div style="font-size:1.05rem;margin-bottom:16px;"><p>You open the next event: a surgical case involving a time-out that did not function as designed and a resulting surgical site infection requiring readmission.</p><p>Read the event carefully before working through the discussion points.</p></div>${vign()}<div class="nav-row"><button class="nav-btn show" id="nb">Begin Discussion</button></div></div>`;
  document.getElementById('nb').onclick=()=>{step="deviation";render();};
}

function renderDeviationStep(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Identifying Deviations")}<div class="card"><span class="step-label">Step 1 of 5</span><h3 class="case-title">Were There Any Deviations?</h3>${vign()}<div class="reference-box"><strong>A note on documentation and performance:</strong> In the SEC algorithm, a deviation from GAPS is evaluated based on what actually occurred, not on what was documented. A time-out that is documented as complete but was not conducted as required is itself a GAPS deviation. Documentation of a safety process is not a substitute for performing it.</div><div class="question">Was there a deviation from Generally Accepted Performance Standards (GAPS) in this event? Select the option that best represents the main deviation.</div><div class="helper-text">Consider what the Universal Protocol requires for a time-out to be valid, and whether those requirements were met.</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  [
    {key:"timeout",label:"The time-out was not conducted as required: the surgeon did not pause, two team members were absent, and antibiotic prophylaxis was not confirmed or administered, despite the time-out being documented as complete",type:"main"},
    {key:"antibiotics",label:"Antibiotic prophylaxis was not ordered for this patient",type:"factually-incorrect"},
    {key:"schedule",label:"The OR schedule was running behind, which is a system failure that caused this event",type:"secondary"},
    {key:"documentation",label:"The documentation of the time-out as complete was accurate because a time-out was attempted",type:"factually-incorrect"},
    {key:"none",label:"There was no deviation in Generally Accepted Performance Standards (GAPS)",type:"no-gaps"}
  ].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleDev(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleDev(btn,opt){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.type==="main"){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">That captures all of the GAPS deviations in this event.</span> There are two distinct but related failures here.<br><br>The first is the time-out itself. A valid time-out requires all team members to be present, all activity to pause, and each checklist element to be actively confirmed. The surgeon was still positioning the patient and talking through the time-out rather than engaging with it. Two team members were absent. Nothing was actually confirmed, including antibiotic prophylaxis. That is not a time-out: it is a recitation that was never received or verified by the team.<br><br>The second is the documentation. The time-out was documented as complete. That documentation is itself a GAPS deviation because it created a false record, one that would make the failure invisible to anyone reviewing the case retrospectively. A documented time-out that did not occur is not evidence of safety. It is evidence of a documentation process that has become disconnected from the safety process it is meant to reflect.<br><br>Now let's look at what made this pattern possible.`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Explore the System Factor";
    nb.onclick=()=>{step="deviation-round2";render();};
  } else if(opt.type==="secondary"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Schedule pressure is a real contributing factor and worth identifying as a system condition.</span> However, a busy schedule does not change what Universal Protocol requires, and it does not explain why the time-out was documented as complete when it was not conducted as required. Have you thought about the two distinct failures in this event: what happened during the time-out, and what happened in the documentation of it?`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>renderDeviationStep();
  } else if(opt.type==="factually-incorrect"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    const d=opt.key==="antibiotics"
      ?"The event does not say antibiotics were not ordered. It says they had not been administered at the time the procedure began. Antibiotic prophylaxis administration is one of the elements that should be confirmed during the time-out. The absence of that confirmation is part of the time-out failure, not an independent ordering issue."
      :"Let's look at what a valid time-out requires. An attempt to conduct a time-out is not the same as conducting one. The Universal Protocol specifies that all team members must be present, all activity must pause, and each element must be actively confirmed. None of those requirements were met here. Have you thought about whether a time-out that was not conducted as required can be accurately documented as complete?";
    fb.innerHTML=`<span style="font-weight:700;">Let's look at this more carefully.</span> ${d}`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>renderDeviationStep();
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's explore that conclusion together before we settle on it.</span> One useful tool when we are uncertain whether a GAPS deviation exists is the <strong>Known Complication Test</strong>. If the answer to all four questions is YES, the event is a known complication. If the answer to any one is NO, it is a safety event. Let's work through those questions.`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Apply the Known Complication Test";
    nb.onclick=()=>{kctIndex=0;step="kct";render();};
  }
}

function renderDeviationRound2(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Identifying Deviations")}<div class="card"><span class="step-label">Step 1 of 5 &middot; Exploring the System Factor</span><h3 class="case-title">What Made This Pattern Possible?</h3>${vign()}<div class="feedback show correct" style="margin-bottom:16px;"><span style="font-weight:700;">The deviations are identified.</span> Time-out not conducted as required; antibiotic prophylaxis not confirmed or administered; time-out documented as complete despite not meeting requirements. Now consider what system conditions allowed this to happen.</div><div class="question">Which of the following best describes the system-level factor most relevant to understanding how these deviations occurred?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Discussion Point 2</button></div></div>`;
  [
    {key:"pressure",label:"Production pressure from a behind-schedule OR created a latent condition in which completing the time-out was subordinated to the goal of getting the case started",type:"main"},
    {key:"training",label:"The surgeon and circulating nurse were unfamiliar with time-out requirements",type:"incorrect"},
    {key:"culture",label:"A culture of speaking up would have prevented any team member from proceeding without completing the time-out",type:"partial"},
    {key:"tech",label:"The EHR time-out documentation system made it easy to document completion without actually completing the process",type:"partial"}
  ].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleCulture(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleCulture(btn,opt){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.type==="main"){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">Production pressure is the system-level condition at the root of this event.</span><br><br>James Reason's organizational accident model, the framework underlying the Swiss Cheese Model, distinguishes between <em>active failures</em>, the immediate unsafe acts that lead to an event, and <em>latent conditions</em>, the pre-existing organizational factors that create the environment in which active failures become likely. Production pressure is one of the most commonly identified latent conditions in healthcare safety events.<br><br>When an OR is running behind schedule, the organizational pressure to catch up creates a silent but powerful incentive to compress or skip steps that are perceived as consuming time. The time-out, which should take two minutes, can feel like an obstacle when the team is already 45 minutes behind. Over time, if that pressure is consistent and unaddressed, the time-out shifts from a genuine safety practice to a documentation ritual: something that gets recorded as done because everyone understands that recording it as done is what moves the case forward.<br><br>This is the latent condition: not the surgeon's behavior on this particular day, but the organizational environment in which production pressure is a persistent, unaddressed background condition that gradually erodes the integrity of the safety processes designed to protect patients. The manager's update tells us this happened in four of seven cases that week. That is not an individual deviation. That is a system operating under pressure without adequate countermeasures.`;
  _logResponse('Discussion Point 1: System Factor', fb.innerHTML);
    nb.classList.add('show');
    nb.onclick=()=>{step="reach";render();};
  } else if(opt.type==="partial"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    const d=opt.key==="culture"
      ?"Psychological safety and a culture of speaking up are essential components of a safe OR environment, and their absence may have contributed here. However, consider what was driving the behavior in the first place. Have you thought about why the time-out was rushed, why two team members were absent, and why no one stopped the case? What organizational condition created the pressure behind those individual behaviors?"
      :"EHR design that makes it easy to document without performing is a legitimate system vulnerability and worth examining. However, consider what motivated the documentation in the first place. Have you thought about why someone chose to document the time-out as complete when it was not? What pressure or incentive was in play that made that choice feel reasonable?";
    fb.innerHTML=`<span style="font-weight:700;">That is one dimension of this, and it is worth examining.</span> ${d}`;
  _logResponse('Discussion Point 1: System Factor', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');document.querySelectorAll('#opts .opt-btn').forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's look at what the event tells us.</span> The circulating nurse initiated the time-out, and the surgeon was actively working in the room. These are not signs of unfamiliarity with the process. Have you thought about what was different about this situation that led to the time-out being conducted the way it was? Consider the schedule context described in the vignette and what pressure that might have created for the team.`;
  _logResponse('Discussion Point 1: System Factor', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');document.querySelectorAll('#opts .opt-btn').forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  }
}

const KCT_QS=[
  {text:"Was the procedure (laparoscopic cholecystectomy) appropriate or warranted for this patient based on nationally recognized standards of care?",answer:"YES"},
  {text:"Was the complication (surgical site infection) a known risk of laparoscopic cholecystectomy, and was the standard of care employed to mitigate that risk at the time of the procedure?",answer:"NO"},
  {text:"Was the complication identified in a timely manner?",answer:"YES"},
  {text:"Was the complication treated according to the standard of care, in a timely manner?",answer:"YES"}
];

function renderKctStep(){
  if(kctIndex>=KCT_QS.length){renderKctResult();return;}
  const q=KCT_QS[kctIndex];
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Known Complication Test")}<div class="card"><span class="step-label">Known Complication Test &middot; Question ${kctIndex+1} of 4</span><h3 class="case-title">Is This a Known Complication or a Safety Event?</h3>${vign()}<div class="reference-box"><strong>Reminder:</strong> ALL four YES = Known Complication. ANY NO = safety event.</div><div class="question">${q.text}</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  ['YES','NO'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.style.flex="1 1 100px";btn.textContent=val;
    btn.onclick=()=>handleKct(btn,val,q);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleKct(btn,val,q){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const isC=val===q.answer;
  btn.classList.add(isC?'selected-correct':'selected-redirect');
  if(!isC)document.querySelectorAll('#opts .opt-btn').forEach(b=>{if(b.textContent===q.answer)b.classList.add('selected-correct');});
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show',isC?'correct':'neutral');
  const notes=[

  setTimeout(function(){
    var endTime = new Date();
    var elapsed = Math.round((endTime - _caseStartTime) / 1000);
    var mins = Math.floor(elapsed / 60);
    var secs = elapsed % 60;
    var timeStr = mins + ' min ' + secs + ' sec';
    window.parent.postMessage({
      type: 'case-complete',
      caseNum: 7,
      log: {
        finalClassification: 'SSE 5 — Moderate Temporary Harm',
        taxonomyEventType: 'PR3 — Wrong Procedure / Universal Protocol Failure (Procedural)',
        managerUpdateRequested: (typeof requestedInfo !== 'undefined' && requestedInfo) ? 'Yes' : 'No',
        sentinelEvent: (typeof sentinelAnswer !== 'undefined' && sentinelAnswer === 'yes') ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable',
        sacSeverity: (typeof sacSeverity !== 'undefined' && sacSeverity) ? sacSeverity : 'Not applicable',
        sacProbability: (typeof sacProbability !== 'undefined' && sacProbability) ? sacProbability : 'Not applicable',
        startTime: _caseStartTime.toLocaleString(),
        endTime: endTime.toLocaleString(),
        timeOnTask: timeStr
      }
    }, '*');
  }, 100);
  document.getElementById('rb').onclick=()=>{requestedInfo=null;kctIndex=0;sentinelAnswer=null;sacSeverity=null;sacProbability=null;
    if (_lastAttemptSnapshot) { _allAttempts.push(_lastAttemptSnapshot); _lastAttemptSnapshot = null; }
    _attemptLog = [];
    _attemptStartTime = new Date();
    step="intro";render();};
}

function render(){
  if(step==="intro")renderIntro();
  else if(step==="deviation")renderDeviationStep();
  else if(step==="deviation-round2")renderDeviationRound2();
  else if(step==="kct")renderKctStep();
  else if(step==="reach")renderReachStep();
  else if(step==="harm-info")renderHarmInfoStep();
  else if(step==="harm-level")renderHarmLevelStep();
  else if(step==="csa")renderCsaSentinelStep();
  else if(step==="summary")renderSummary();
}
render();
</script></body>
</html>
