<style>
  :root{--edgewood-red:#BB0000;--black:#000000;--white:#FFFFFF;--dark-gold:#C8932B;--warm-grey:#F0EEEB;--dark-web-grey:#58595B;--slate-blue:#5794AD;--light-grey:#C2C6C8;}
  *{box-sizing:border-box;}body{font-family:'Source Sans Pro',Arial,sans-serif;background:var(--warm-grey);color:var(--black);margin:0;padding:0;line-height:1.6;}
  .wrap{max-width:860px;margin:0 auto;padding:24px 20px 60px;}
  header{background:var(--black);color:var(--white);padding:28px 20px;text-align:center;}
  header h1{font-family:'Spectral',Georgia,serif;margin:0 0 6px;font-size:1.7rem;letter-spacing:.5px;}
  header p{margin:0;color:var(--light-grey);font-size:.95rem;}
  .accent-bar{height:6px;background:var(--edgewood-red);}
  .card{background:var(--white);border:1px solid var(--light-grey);border-radius:6px;padding:24px;margin-top:24px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
  .progress-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;margin-bottom:4px;font-size:.9rem;color:var(--dark-web-grey);}
  .progress-bar-bg{background:var(--light-grey);border-radius:4px;height:8px;overflow:hidden;margin-bottom:4px;}
  .progress-bar-fill{background:var(--edgewood-red);height:100%;transition:width .3s ease;}
  .step-label{display:inline-block;background:var(--dark-gold);color:var(--white);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:3px;margin-bottom:12px;}
  .case-title{font-family:'Spectral',Georgia,serif;font-size:1.4rem;margin:0 0 14px;color:var(--black);}
  .vignette{background:var(--warm-grey);border-left:4px solid var(--slate-blue);padding:16px 18px;border-radius:4px;margin-bottom:18px;font-size:1rem;}
  .question{font-weight:700;margin-bottom:4px;font-size:1.05rem;}
  .helper-text{font-size:.92rem;color:var(--dark-web-grey);margin:6px 0 14px;}
  .reference-box{background:var(--warm-grey);border:1px solid var(--light-grey);border-radius:4px;padding:12px 16px;margin-bottom:16px;font-size:.88rem;color:var(--dark-web-grey);}
  .reference-box strong{color:var(--black);}
  .reference-box ul{margin:8px 0 0;padding-left:18px;}
  .reference-box li{margin-bottom:4px;}
  .info-box{background:#fff8e6;border:1px solid var(--dark-gold);border-left:4px solid var(--dark-gold);border-radius:4px;padding:14px 16px;margin:16px 0;font-size:.95rem;}
  .info-box strong{display:block;margin-bottom:4px;color:var(--dark-gold);}
  .options{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;}
  .opt-btn{flex:1 1 220px;background:var(--white);border:2px solid var(--slate-blue);color:var(--black);font-family:inherit;font-size:.98rem;font-weight:600;padding:14px 18px;border-radius:5px;cursor:pointer;transition:all .15s ease;text-align:left;}
  .opt-btn:hover{background:var(--slate-blue);color:var(--white);}
  .opt-btn.selected-correct{background:#2e7d32;border-color:#2e7d32;color:var(--white);}
  .opt-btn.selected-redirect{background:var(--edgewood-red);border-color:var(--edgewood-red);color:var(--white);}
  .opt-btn:disabled{cursor:default;opacity:1;}
  .opt-btn:disabled:not(.selected-correct):not(.selected-redirect){opacity:.45;}
  .feedback{margin-top:18px;padding:16px 18px;border-radius:5px;font-size:.97rem;display:none;}
  .feedback.show{display:block;animation:fadein .25s ease;}
  .feedback.correct{background:#eaf5ea;border-left:4px solid #2e7d32;}
  .feedback.neutral{background:var(--warm-grey);border-left:4px solid var(--slate-blue);}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .nav-row{display:flex;justify-content:flex-end;margin-top:22px;}
  .nav-btn{background:var(--edgewood-red);color:var(--white);border:none;font-family:inherit;font-size:1rem;font-weight:700;padding:12px 28px;border-radius:5px;cursor:pointer;display:none;}
  .nav-btn.show{display:inline-block;}
  .nav-btn:hover{background:#930000;}
  .summary-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.92rem;}
  .summary-table th,.summary-table td{border:1px solid var(--light-grey);padding:8px 10px;text-align:left;}
  .summary-table th{background:var(--black);color:var(--white);font-family:'Spectral',Georgia,serif;font-weight:600;}
  .summary-table tr:nth-child(even) td{background:var(--warm-grey);}
  .score-badge{display:inline-block;background:var(--edgewood-red);color:var(--white);font-family:'Spectral',Georgia,serif;font-size:1.6rem;font-weight:700;padding:14px 28px;border-radius:6px;margin:14px 0;}
  .small-note{font-size:.85rem;color:var(--dark-web-grey);margin-top:18px;text-align:center;}
  .restart-btn{background:transparent;border:2px solid var(--dark-web-grey);color:var(--dark-web-grey);font-family:inherit;font-weight:700;padding:10px 22px;border-radius:5px;cursor:pointer;margin-top:18px;}
  .restart-btn:hover{background:var(--dark-web-grey);color:var(--white);}

    <img class="resource-header-logo" src="eu_logo_primary.jpg" alt="Edgewood University">
    <div class="resource-header-text">

    </div>

<div class="accent-bar"></div>
<div class="wrap"><div id="app"></div></div>
<script>
const VIGNETTE = "A terminally ill patient is admitted to the intensive care unit with a diagnosis of end-stage pancreatic cancer. His attending physician has documented that death is expected within the next two to three weeks. The patient has a documented advance directive and the care team has initiated comfort-focused goals of care. During a routine nursing shift, a medication error results in the patient receiving a morphine dose approximately four times the intended amount. The patient's respiratory status declines rapidly. Despite the nursing team's recognition of the error and immediate notification of the attending, the patient expires within the hour. His family, who had been with him earlier in the day, was not present at the time of his death. They arrived approximately 20 minutes after he had passed.";
const MANAGER_UPDATE = "Per the ICU medical director and the palliative care team's review, the patient's death was expected within two to three weeks. The morphine overdose accelerated his death. The family has been informed of the medication error and has expressed profound grief not only over the loss but over not being present at the moment of death, which was a stated wish documented in the patient's care plan. The nursing staff member who prepared and administered the medication has been placed on supportive leave and has been referred to the employee assistance program.";

let step="intro",requestedInfo=null,kctIndex=0,sentinelAnswer=null,sacSeverity=null,sacProbability=null;
const app=document.getElementById('app');
const _caseStartTime = new Date();
let _attemptLog = [];
let _allAttempts = [];
let _lastAttemptSnapshot = null;
let _attemptStartTime = new Date();
var _pendingSelected = '';

function _captureSelected(btn) {
  _pendingSelected = btn.textContent.trim();
}

function _logResponse(stepName, fbHTML) {
  var alreadyLogged = _attemptLog.some(function(r){ return r.step === stepName; });
  if (alreadyLogged) return;
  var div = document.createElement('div');
  div.innerHTML = fbHTML || '';
  var cleanText = (div.textContent || div.innerText || '').trim();
  _attemptLog.push({ step: stepName, selected: _pendingSelected, feedback: cleanText });
}

function _buildAttemptLog() {
  var endTime = new Date();
  var elapsed = Math.round((endTime - _attemptStartTime) / 1000);
  var mins = Math.floor(elapsed / 60);
  var secs = elapsed % 60;
  return {
    finalClassification: 'SSE 1 — Death',
    taxonomyEventType: 'CM1 — Medication Error (Care Management); Inpatient ICU',
    managerUpdateRequested: (typeof requestedInfo !== 'undefined' && requestedInfo) ? 'Yes' : 'No',
    sentinelEvent: (typeof sentinelAnswer !== 'undefined') ? (sentinelAnswer === 'yes' ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable') : 'Not applicable',
    sacSeverity: (typeof sacSeverity !== 'undefined' && sacSeverity) ? sacSeverity : 'Not applicable',
    sacProbability: (typeof sacProbability !== 'undefined' && sacProbability) ? sacProbability : 'Not applicable',
    startTime: _attemptStartTime.toLocaleString(),
    endTime: endTime.toLocaleString(),
    timeOnTask: mins + ' min ' + secs + ' sec',
    responses: _attemptLog.slice()
  };
}
function vign(){return `<div class="vignette"><strong>The Event:</strong> ${VIGNETTE}</div>`;}
function pb(n,t,l){return `<div class="progress-row"><span>${l}</span><span>Step ${n} of ${t}</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round(n/t*100)}%;"></div></div>`;}



function renderIntro(){
  app.innerHTML=`<div class="card"><span class="step-label">Case 13</span><div style="font-size:1.05rem;margin-bottom:16px;"><p>You open the next event: a medication error involving a terminally ill patient in the ICU. This case raises one of the most nuanced questions in safety event classification: when a patient was expected to die, does an error that hastens death constitute a preventable patient death?</p><p>Read the event carefully and work through each discussion point with that question in mind.</p></div>${vign()}<div class="nav-row"><button class="nav-btn show" id="nb">Begin Discussion</button></div></div>`;
  document.getElementById('nb').onclick=()=>{step="deviation";render();};
}

function renderDeviationStep(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Identifying Deviations")}<div class="card"><span class="step-label">Step 1 of 5</span><h3 class="case-title">Were There Any Deviations?</h3>${vign()}<div class="reference-box"><strong>Context for this event:</strong> The patient's terminal prognosis and comfort-focused care plan are important clinical context, but they do not change the standards that govern medication preparation and administration. A morphine overdose resulting from a medication error is a deviation from GAPS regardless of the patient's underlying prognosis. The clinical circumstances affect how we interpret the outcome, but not whether a deviation occurred.</div><div class="question">Was there a deviation from Generally Accepted Performance Standards (GAPS) in this event?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  [
    {key:"med",label:"A medication error resulted in the patient receiving approximately four times the intended morphine dose",type:"main"},
    {key:"family",label:"The family was not notified in time to be present at the patient's death, which was a documented care plan goal",type:"secondary"},
    {key:"terminal",label:"There was no deviation because the patient was terminally ill and expected to die",type:"incorrect"},
    {key:"none",label:"There was no deviation in Generally Accepted Performance Standards (GAPS)",type:"no-gaps"}
  ].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleDev(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleDev(btn,opt){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.type==="main"){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">That identifies the GAPS deviation accurately.</span> A morphine overdose resulting from a medication preparation or administration error is a clear deviation from the standard of care for medication safety, regardless of the patient's underlying condition. The patient's terminal prognosis does not change what the standard of care requires at the point of medication administration. Every patient, including those in palliative or comfort-focused care, deserves to receive medications as ordered, accurately and safely.<br><br>Now let's examine the system factor that contributed to this error.`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Explore the System Factor";
    nb.onclick=()=>{step="deviation-round2";render();};
  } else if(opt.type==="secondary"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">The family not being present is a significant consequence of this event and part of the harm picture.</span> However, it is a downstream consequence rather than the primary GAPS deviation. Have you thought about what the nursing standard of care requires at the point of preparing and administering a controlled substance like morphine, and where the standard was not met?`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>renderDeviationStep();
  } else if(opt.type==="incorrect"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">The patient's terminal prognosis is important clinical context, but it does not change the standard of care for medication safety.</span> Every patient has the right to receive medications as ordered, accurately and safely. A morphine overdose is a deviation from that standard regardless of the patient's expected prognosis. Have you thought about what the medication administration standard requires and whether it was met in this event?`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>renderDeviationStep();
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's explore that conclusion before settling on it.</span> The Known Complication Test can help us evaluate this event systematically. Let's work through those four questions.`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Apply the Known Complication Test";
    nb.onclick=()=>{kctIndex=0;step="kct";render();};
  }
}

function renderDeviationRound2(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Identifying Deviations")}<div class="card"><span class="step-label">Step 1 of 5 &middot; Exploring the System Factor</span><h3 class="case-title">What System Factor Contributed to the Medication Error?</h3>${vign()}<div class="feedback show correct" style="margin-bottom:16px;"><span style="font-weight:700;">The GAPS deviation is identified.</span> A morphine overdose resulting from a medication error. Now consider what system condition made this error possible.</div><div class="question">Which of the following best describes the system-level factor most relevant to this medication error?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Discussion Point 2</button></div></div>`;
  [
    {key:"concentration",label:"High-concentration opioid preparations were available in the ICU without adequate differentiation from standard-dose preparations",type:"main"},
    {key:"distraction",label:"The nursing staff member was distracted by competing demands during medication preparation",type:"partial"},
    {key:"policy",label:"No independent verification policy existed for opioid administration in this ICU",type:"main2"},
    {key:"terminal",label:"The patient's terminal status may have influenced the level of scrutiny applied to his medication administration",type:"partial"}
  ].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleCulture(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleCulture(btn,opt){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.type==="main"||opt.type==="main2"){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">${opt.type==="main"?"That identifies a critical system vulnerability.":"That identifies an important structural gap."}</span> ${opt.type==="main"?"When multiple concentrations or formulations of a high-alert medication like morphine are available in the same clinical environment without clear physical or visual differentiation, the risk of a dose error increases significantly. ISMP classifies opioids as high-alert medications precisely because dose errors can have catastrophic consequences. The system condition that allowed a four-fold overdose to be prepared without detection is the focus of the CSA.":"An independent verification requirement for opioid administration is a recognized safety practice for exactly this reason: a second pair of eyes on a high-alert medication before it reaches the patient is the last human barrier before administration. Its absence leaves dose preparation as a single-person, single-check process."}<br><br>Both system factors, the availability of multiple concentrations without clear differentiation and the absence of independent verification, are likely present in this event and would both be examined in a CSA.`;
  _logResponse('Discussion Point 1: System Factor', fb.innerHTML);
    nb.classList.add('show');
    nb.onclick=()=>{step="reach";render();};
  } else if(opt.type==="partial"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    const d=opt.key==="distraction"
      ?"Distraction during medication preparation is a real contributing factor and worth noting. However, a system designed for medication safety cannot rely on an environment free of distraction: ICUs are inherently high-demand environments. Have you thought about what structural safeguards should exist to catch a dose error even when a nurse is distracted?"
      :"The possibility that a patient's terminal status influenced the attention applied to their care is a serious equity and dignity concern, and it is worth surfacing in a CSA. However, the more proximate system question is what structural safeguards were or were not in place for opioid administration in this ICU. Have you thought about what verification or differentiation processes should have been present regardless of the patient's prognosis?";
    fb.innerHTML=`<span style="font-weight:700;">That is a dimension worth examining.</span> ${d}`;
  _logResponse('Discussion Point 1: System Factor', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');document.querySelectorAll('#opts .opt-btn').forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  }
}

const KCT_QS=[
  {text:"Was the treatment (morphine for pain and comfort management in a terminally ill patient) appropriate or warranted based on nationally recognized standards of care?",answer:"YES"},
  {text:"Was the complication (morphine overdose causing rapid respiratory decline and death) a known risk of morphine administration, and was the standard of care employed to mitigate that risk?",answer:"NO"},
  {text:"Was the complication identified in a timely manner?",answer:"YES"},
  {text:"Was the complication treated according to the standard of care, in a timely manner?",answer:"NO"}
];

function renderKctStep(){
  if(kctIndex>=KCT_QS.length){renderKctResult();return;}
  const q=KCT_QS[kctIndex];
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Known Complication Test")}<div class="card"><span class="step-label">Known Complication Test &middot; Question ${kctIndex+1} of 4</span><h3 class="case-title">Is This a Known Complication or a Safety Event?</h3>${vign()}<div class="reference-box"><strong>Reminder:</strong> ALL four YES = Known Complication. ANY NO = safety event.</div><div class="question">${q.text}</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  ['YES','NO'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.style.flex="1 1 100px";btn.textContent=val;
    btn.onclick=()=>handleKct(btn,val,q);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleKct(btn,val,q){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const isC=val===q.answer;
  btn.classList.add(isC?'selected-correct':'selected-redirect');
  if(!isC)document.querySelectorAll('#opts .opt-btn').forEach(b=>{if(b.textContent===q.answer)b.classList.add('selected-correct');});
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show',isC?'correct':'neutral');
  const notes=[
    ["Morphine for pain and comfort management in a terminally ill patient with end-stage cancer is appropriate and consistent with palliative care standards. The medication itself was indicated.","Morphine is a standard and appropriate medication for comfort management in end-of-life care. The clinical indication was present, pointing toward YES."],
    ["Respiratory depression and death at high doses are known risks of morphine. However, the standard of care mitigation, accurate dose preparation and verification, was not employed. A dose four times the intended amount was administered. The mitigation was absent. This points to NO.","Consider both parts: was the risk known, and was the standard of care employed to mitigate it? Accurate dose preparation is the primary mitigation for opioid overdose risk. It did not occur correctly. This points to NO."],
    ["The nursing team recognized the error when the patient's respiratory status declined rapidly and immediately notified the attending. The complication was identified promptly in the clinical sense, though by that point the error had already occurred.","The nursing team identified the crisis quickly and escalated immediately. That is timely identification in the context of an acute deterioration, pointing toward YES."],
    ["By the time the error was identified and the attending was notified, the patient had progressed to a point where reversal was not achievable. The patient expired within the hour. The complication could not be effectively reversed given the dose and the patient's baseline condition. This points to NO.","The patient expired despite recognition of the error. The ability to effectively treat the complication was limited by the dose received and the patient's underlying condition. This points to NO."]
  ];
  const[c,i]=notes[kctIndex];
  fb.innerHTML=`<span style="font-weight:700;">${isC?"That aligns with the evidence in the event.":"Let's think through this one together."}</span> ${isC?c:i}`;
  _logResponse('KCT Question ' + (typeof kctIndex !== 'undefined' ? kctIndex + 1 : ''), fb.innerHTML);
  const nb=document.getElementById('nb');nb.classList.add('show');
  nb.onclick=()=>{kctIndex++;renderKctStep();};
}

function renderKctResult(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Known Complication Test")}<div class="card"><span class="step-label">Known Complication Test &middot; Result</span><h3 class="case-title">What Does This Tell Us?</h3><div class="feedback show neutral"><span style="font-weight:700;">Two of the four answers came back NO.</span> This is a safety event. Let's go back and identify the deviation.</div><div class="nav-row"><button class="nav-btn show" id="nb">Return to Discussion Point 1</button></div></div>`;
  document.getElementById('nb').onclick=()=>{step="deviation";render();};
}

function renderReachStep(){
  app.innerHTML=`${pb(2,5,"Discussion Point 2: Did the Deviation Reach the Patient?")}<div class="card"><span class="step-label">Step 2 of 5</span><h3 class="case-title">Did the Deviation Reach the Patient?</h3>${vign()}<div class="question">Did the deviation reach the patient in this event?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Discussion Point 3</button></div></div>`;
  ['Yes, it reached the patient','No, a barrier caught it first'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=val;
    btn.onclick=()=>handleReach(btn,val);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleReach(btn,val){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const isC=val==='Yes, it reached the patient';
  btn.classList.add(isC?'selected-correct':'selected-redirect');
  if(!isC)document.querySelectorAll('#opts .opt-btn').forEach(b=>{if(b.textContent==='Yes, it reached the patient')b.classList.add('selected-correct');});
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  if(isC){fb.classList.add('correct');fb.innerHTML=`<span style="font-weight:700;">That is a sound read of this situation.</span> The overdose was administered. No barrier intercepted it before the medication reached the patient. The patient's respiratory status declined rapidly following administration, and he expired within the hour. The deviation reached the patient directly and completely.`;
  _logResponse('Discussion Point 2: Reach', fb.innerHTML);}
  else{fb.classList.add('neutral');fb.innerHTML=`<span style="font-weight:700;">Let's think about what a catch would have looked like here.</span> A catch would have required either an accurate dose preparation preventing the error, or a verification step identifying the error before administration. Neither occurred. The morphine was administered at four times the intended dose. The deviation reached the patient.`;
  _logResponse('Discussion Point 2: Reach', fb.innerHTML);}
  const nb=document.getElementById('nb');nb.classList.add('show');
  nb.onclick=()=>{step="harm-info";render();};
}

function renderHarmInfoStep(){
  app.innerHTML=`${pb(3,5,"Discussion Point 3: Level of Harm")}<div class="card"><span class="step-label">Step 3 of 5</span><h3 class="case-title">What Was the Level of Harm?</h3>${vign()}<div class="reference-box"><strong>A critical principle for this case:</strong> When a patient was terminally ill and expected to die, it may be tempting to classify the death as the natural outcome of the underlying illness rather than as a safety event outcome. The SEC framework and most patient safety authorities are clear on this point: if an error or omission shortened a patient's life by even one minute, the death is considered a preventable patient death and should be classified as SSE 1, regardless of the underlying prognosis.</div><div class="question">Before scoring the level of harm, do you need more information?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  ['Yes, request more information from the manager/designee','No, proceed with the information available'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=val;
    btn.onclick=()=>handleHarmInfo(btn,val);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleHarmInfo(btn,val){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  btn.classList.add('selected-correct');
  requestedInfo=val.startsWith('Yes');
  const fb=document.getElementById('fb');fb.classList.add('show','neutral');
  const nb=document.getElementById('nb');nb.classList.add('show');
  if(requestedInfo){
    fb.innerHTML=`<span style="font-weight:700;">Requesting more information is sound practice here.</span> Understanding whether the medical team confirms the overdose hastened death, and what the family's experience was, is important context for both classification and response. You reach out to the ICU medical director.<div class="info-box"><strong>Manager/Designee Update</strong>${MANAGER_UPDATE}</div>`;
  _logResponse('Discussion Point 3: Request Info?', fb.innerHTML);
  } else {
    fb.innerHTML=`<span style="font-weight:700;">Proceeding with the documented information is a starting point.</span> The vignette tells us the patient received a morphine overdose and expired within the hour. He was expected to die within two to three weeks. The principle in the reference box above applies here. Let's score the level of harm.`;
  _logResponse('Discussion Point 3: Request Info?', fb.innerHTML);
  }
  nb.onclick=()=>{step="harm-level";render();};
}

function renderHarmLevelStep(){
  const rem=requestedInfo?`<div class="info-box"><strong>Manager/Designee Update</strong>${MANAGER_UPDATE}</div>`:"";
  app.innerHTML=`${pb(3,5,"Discussion Point 3: Level of Harm")}<div class="card"><span class="step-label">Step 3 of 5</span><h3 class="case-title">Score the Level of Harm</h3>${vign()}${rem}<div class="reference-box"><strong>SEC Levels of Harm:</strong><ul><li><strong>SSE 1</strong> &mdash; Death</li><li><strong>SSE 2</strong> &mdash; Severe Permanent Harm: life-changing, permanent, not related to the natural progression of illness</li></ul><strong>Guiding principle:</strong> If an error shortened a patient's life by even one minute, the outcome is classified as SSE 1, regardless of the patient's underlying prognosis or expected survival.</div><div class="question">How would you classify the level of harm in this event?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Discussion Point 4</button></div></div>`;
  [
    {key:"sse1",label:"Death (SSE 1) &mdash; the error hastened death, even though death was expected"},
    {key:"sse2",label:"Severe Permanent Harm (SSE 2) &mdash; the patient's prognosis was already terminal, so this is not a preventable death"},
    {key:"sse5",label:"Moderate Temporary Harm (SSE 5) &mdash; the patient was going to die anyway, so the harm should reflect the shortened time rather than the death itself"},
    {key:"none",label:"No additional harm &mdash; the patient's death was the expected outcome of his illness"}
  ].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleHarmLevel(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleHarmLevel(btn,opt){
  const allBtns=document.querySelectorAll('#opts .opt-btn');
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.key==='sse1'){
    allBtns.forEach(b=>b.disabled=true);btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">SSE 1: Death is the right classification, and the reasoning is essential to understand.</span><br><br>The patient was expected to die. That fact does not change what happened. A medication error caused his respiratory status to decline rapidly, and he died within an hour of the overdose. He was expected to live for another two to three weeks. Those weeks were taken from him by a preventable error, not by his cancer.<br><br>The principle that governs this classification is clear and intentional: if an error or omission shortened a patient's life by even one minute, the death is considered a preventable patient death and is classified as SSE 1. This principle exists for important reasons. First, every patient's remaining life has value regardless of its expected duration. Second, allowing organizations to classify hastened deaths of terminal patients as "expected outcomes" would create a category of patients whose safety events go unexamined, which is both ethically wrong and practically dangerous for the quality of end-of-life care.<br><br>${requestedInfo?"The manager's update confirms that the palliative care and ICU teams determined the morphine overdose accelerated the patient's death. The family's grief includes not only the loss but the loss of the opportunity to be present, which was a documented goal. Both are harm dimensions of this event.":"Even without the manager update, the principle applies: the morphine overdose is what caused the patient to die within the hour rather than within weeks."}`;
    nb.classList.add('show');nb.onclick=()=>{step="csa";render();};
  } else {
    allBtns.forEach(b=>b.disabled=true);btn.classList.add('selected-redirect');fb.classList.add('neutral');
    let detail;
    if(opt.key==='sse2') detail="SSE 2 is for severe permanent harm short of death. The patient died. Regardless of his underlying prognosis, the SEC outcome is death, which is SSE 1. Have you thought about the principle in the reference box above and how it applies here?";
    else if(opt.key==='sse5') detail="The harm is not the shortened time. The harm is the death itself, which was hastened by the error. The SEC principle is unambiguous: if an error shortened a patient's life by even one minute, the outcome is classified as SSE 1. Have you thought about how that principle applies regardless of how much time was shortened?";
    else detail="The patient's death was the expected eventual outcome of his cancer, but the immediate cause of his death within the hour was the morphine overdose. The SEC framework draws a clear distinction between death from illness progression and death hastened by a preventable error. Have you thought about which caused this patient to die at this moment?";
    fb.innerHTML=`<span style="font-weight:700;">Let's look at the guiding principle for this case.</span> ${detail}`;
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');nb.textContent="Continue to Discussion Point 4";allBtns.forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  }
}

function renderCsaSentinelStep(){
  app.innerHTML=`${pb(4,5,"Discussion Point 4: Should a CSA Be Completed?")}<div class="card"><span class="step-label">Step 4 of 5 &middot; Sentinel Event Determination</span><h3 class="case-title">Is This a Sentinel Event per The Joint Commission?</h3>${vign()}<div class="question">Do you believe this event meets The Joint Commission's definition of a sentinel event?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Priority Matrix</button></div></div>`;
  [{val:'yes',label:'Yes, this is a sentinel event'},{val:'no',label:'No, this is not a sentinel event'},{val:'unsure',label:'Unsure, I need to think through it'}].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleSentinel(btn,opt.val);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleSentinel(btn,val){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(val==='yes'){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">That is the right determination.</span> Death is the clearest possible sentinel event criterion under the JC Sentinel Event Policy. A patient died as a result of a preventable medication error. The patient's terminal prognosis does not remove the sentinel event designation. For Joint Commission-accredited organizations, a CSA is required. Let's use the SAC Matrix to think through the scope of response.`;
  _logResponse('Discussion Point 4: Sentinel Event', fb.innerHTML);
    nb.classList.add('show');nb.onclick=()=>renderCsaMatrixStep();
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's look at the JC definition carefully.</span><div class="info-box"><strong>JC Sentinel Event Policy (July 2026)</strong>A sentinel event results in death, severe harm regardless of duration, or permanent harm regardless of severity.</div>Death is the first and most direct criterion. A patient died. The patient's terminal prognosis does not change the outcome: he died as a result of a medication error, not from the natural progression of his cancer alone. Have you thought about how that compares to the sentinel event criteria?`;
  _logResponse('Discussion Point 4: Sentinel Event', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Reconsider My Answer";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');nb.textContent="Continue to Priority Matrix";document.querySelectorAll('#opts .opt-btn').forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  }
}

function renderCsaMatrixStep(){
  app.innerHTML=`${pb(4,5,"Discussion Point 4: Should a CSA Be Completed?")}<div class="card"><span class="step-label">Step 4 of 5 &middot; SAC Priority Matrix</span><h3 class="case-title">Using the SAC Matrix to Guide Resource Allocation</h3><div class="feedback show correct" style="margin-bottom:16px;"><span style="font-weight:700;">Sentinel event confirmed.</span> Death of a patient from a preventable medication error. A CSA is required.</div><div class="reference-box"><strong>SAC Matrix (RCA2, Appendix A)</strong><br><strong>Severity:</strong><ul><li><strong>Catastrophic:</strong> Death, major permanent loss of function, or any JC sentinel event</li><li><strong>Major / Moderate / Minor</strong></ul><strong>Probability:</strong><ul><li><strong>Frequent / Occasional / Uncommon / Remote</strong></ul><em>Scenario context: Medication errors involving opioid overdose in your ICU occur occasionally.</em></div><div class="question">How would you classify the <strong>severity</strong>?</div><div class="options" id="sev-opts"></div><div class="feedback" id="sev-fb"></div><div id="prob-section" style="display:none;margin-top:22px;"><div class="question">How would you classify the <strong>probability</strong>?</div><div class="options" id="prob-opts"></div><div class="feedback" id="prob-fb"></div></div><div id="matrix-result" style="display:none;margin-top:22px;"></div><div class="nav-row"><button class="nav-btn" id="nb">See Final Summary</button></div></div>`;
  [{val:'catastrophic',label:'Catastrophic'},{val:'major',label:'Major'},{val:'moderate',label:'Moderate'},{val:'minor',label:'Minor'}].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleSev(btn,opt.val);
    document.getElementById('sev-opts').appendChild(btn);
  });
}

function handleSev(btn,val){
  document.querySelectorAll('#sev-opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('sev-fb');fb.classList.add('show');
  if(val==='catastrophic'){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">Catastrophic is the right category.</span> Death is explicitly included in the Catastrophic severity definition. This event also qualifies as a JC sentinel event, which is independently Catastrophic. Both criteria apply.`;
  _logResponse('Discussion Point 4: SAC Severity', fb.innerHTML);
    showProb();
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's revisit the Catastrophic definition.</span> Catastrophic includes death and any JC sentinel event. The patient died. That alone places this in the Catastrophic category.`;
  _logResponse('Discussion Point 4: SAC Severity', fb.innerHTML);
    document.querySelectorAll('#sev-opts .opt-btn').forEach(b=>b.disabled=false);btn.disabled=true;
  }
}

function showProb(){
  document.getElementById('prob-section').style.display='block';
  [{val:'frequent',label:'Frequent'},{val:'occasional',label:'Occasional'},{val:'uncommon',label:'Uncommon'},{val:'remote',label:'Remote'}].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleProbFn(btn,opt.val);
    document.getElementById('prob-opts').appendChild(btn);
  });
}

function handleProbFn(btn,val){
  document.querySelectorAll('#prob-opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  sacProbability=val;btn.classList.add('selected-correct');
  const fb=document.getElementById('prob-fb');fb.classList.add('show','neutral');
  fb.innerHTML=`<span style="font-weight:700;">Probability noted.</span> At Catastrophic severity, any probability produces a SAC score of 3.`;
  _logResponse('Discussion Point 4: SAC Probability', fb.innerHTML);
  showMatRes();
}

function showMatRes(){
  const r=document.getElementById('matrix-result');r.style.display='block';
  r.innerHTML=`<div class="reference-box" style="border-left:4px solid var(--edgewood-red);"><strong>SAC Matrix Result: Score of 3 (Highest Risk)</strong><br><br>Catastrophic severity with any probability = SAC 3. A CSA is warranted.<br><br><table class="summary-table" style="margin-top:8px;font-size:.85rem;"><tr><th></th><th>Catastrophic</th><th>Major</th><th>Moderate</th><th>Minor</th></tr><tr><td><strong>Frequent</strong></td><td style="background:#fdeaea;font-weight:700;text-align:center;">3</td><td style="text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td></tr><tr><td><strong>Occasional</strong></td><td style="background:#fdeaea;font-weight:700;text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr><tr><td><strong>Uncommon</strong></td><td style="background:#fdeaea;font-weight:700;text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr><tr><td><strong>Remote</strong></td><td style="background:#fdeaea;font-weight:700;text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr></table></div>`;
  const nb=document.getElementById('nb');nb.classList.add('show');nb.textContent="See Final Summary";
  nb.onclick=()=>{step="summary";render();};
}

function renderSummary(){
  const _currentAttemptSnapshot = _buildAttemptLog();
  _lastAttemptSnapshot = _currentAttemptSnapshot;
  var _snapshotToSend = _currentAttemptSnapshot;
  var _allToSend = _allAttempts.concat([_snapshotToSend]);

  app.innerHTML=`${pb(5,5,"Final Summary")}<div class="card" style="text-align:center;"><span class="step-label">Case 13 Complete</span><h3 class="case-title">Final SEC Classification</h3><div class="score-badge">SSE 1</div><p>Death</p><table class="summary-table" style="text-align:left;"><tr><th>Discussion Point</th><th>Conclusion</th></tr><tr><td>Taxonomy Event Type</td><td>CM1 &mdash; Medication Error (Care Management); ICU Setting</td></tr><tr><td>Deviation from GAPS?</td><td>Yes &mdash; morphine overdose (approximately 4x intended dose) from a medication preparation or administration error</td></tr><tr><td>Contributing system factor</td><td>High-alert opioid safety systems: concentration differentiation and/or independent verification gaps (ISMP high-alert medication framework)</td></tr><tr><td>Did the deviation reach the patient?</td><td>Yes &mdash; overdose administered; no barrier intercepted it before patient received medication</td></tr><tr><td>Additional information requested?</td><td>${requestedInfo?"Yes &mdash; medical team confirmed death was hastened by the overdose; family not present at death despite documented care plan goal; nursing staff member referred to EAP":"No"}</td></tr><tr><td>Level of harm</td><td>SSE 1 &mdash; Death (error hastened death by weeks; terminal prognosis does not change classification)</td></tr><tr><td>SEC Classification</td><td>Serious Safety Event</td></tr><tr><td>Sentinel event per JC?</td><td>Yes &mdash; patient death from a preventable medication error (JC July 2026)</td></tr><tr><td>SAC Matrix score</td><td>3 (Catastrophic severity, any probability) &mdash; CSA warranted</td></tr></table><div class="feedback show neutral" style="text-align:left;margin-top:20px;"><span style="font-weight:700;">The most important principle from this case.</span> A death hastened by a preventable error is SSE 1, even when the patient was terminally ill and expected to die. This principle is not a technicality. It reflects a fundamental commitment to the equal value of every patient's remaining life and to the integrity of safety review in end-of-life care settings. If terminal patients were excluded from full safety event classification, the systems of care that serve some of our most vulnerable patients would lose an essential mechanism for identifying and addressing preventable harm.</div><div class="feedback show neutral" style="text-align:left;margin-top:20px;"><span style="font-weight:700;">A note on second victim syndrome.</span> The nursing staff member who prepared and administered this medication will carry the weight of this event in a profound way. To make a medication error that hastens a patient's death, even in a setting where death was expected, is an experience that can permanently alter a clinician's professional identity and wellbeing. The organizational response must include meaningful, sustained support for that person, not as a distraction from the system analysis, but as an integral part of a just and compassionate response to a tragedy that touched everyone involved.</div><button class="restart-btn" id="rb">Restart Case 13</button></div>`;
  
  // Send completion data to parent shell
  setTimeout(function(){
    var endTime = new Date();
    var elapsed = Math.round((endTime - _caseStartTime) / 1000);
    var mins = Math.floor(elapsed / 60);
    var secs = elapsed % 60;
    var timeStr = mins + ' min ' + secs + ' sec';
    window.parent.postMessage({
      type: 'case-complete',
      caseNum: 13,
      log: {
        finalClassification: 'SSE 1 — Death',
        taxonomyEventType: 'CM1 — Medication Error (Care Management)',
        managerUpdateRequested: (typeof requestedInfo !== 'undefined' && requestedInfo) ? 'Yes' : 'No',
        sentinelEvent: (typeof sentinelAnswer !== 'undefined' && sentinelAnswer === 'yes') ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable',
        sacSeverity: (typeof sacSeverity !== 'undefined' && sacSeverity) ? sacSeverity : 'Not applicable',
        sacProbability: (typeof sacProbability !== 'undefined' && sacProbability) ? sacProbability : 'Not applicable',
        startTime: _caseStartTime.toLocaleString(),
        endTime: endTime.toLocaleString(),
        timeOnTask: timeStr
      }
    }, '*');
  }, 100);
  document.getElementById('rb').onclick=()=>{requestedInfo=null;kctIndex=0;sentinelAnswer=null;sacSeverity=null;sacProbability=null;
    if (_lastAttemptSnapshot) { _allAttempts.push(_lastAttemptSnapshot); _lastAttemptSnapshot = null; }
    _attemptLog = [];
    _attemptStartTime = new Date();
    step="intro";render();};
}

function render(){
  if(step==="intro")renderIntro();
  else if(step==="deviation")renderDeviationStep();
  else if(step==="deviation-round2")renderDeviationRound2();
  else if(step==="kct")renderKctStep();
  else if(step==="reach")renderReachStep();
  else if(step==="harm-info")renderHarmInfoStep();
  else if(step==="harm-level")renderHarmLevelStep();
  else if(step==="csa")renderCsaSentinelStep();
  else if(step==="summary")renderSummary();
}
render();
</script></body>
</html>
