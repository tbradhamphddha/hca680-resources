    --black: #000000;
    --white: #FFFFFF;
    --dark-gold: #C8932B;
    --warm-grey: #F0EEEB;

  * { box-sizing: border-box; }
  body {

  .opt-btn:hover { background: var(--slate-blue); color: var(--white); }
  .opt-btn.selected-correct { background: #2e7d32; border-color: #2e7d32; color: var(--white); }

  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    font-size: 1rem;

  }
  .nav-btn.show { display: inline-block; }
  .nav-btn:hover { background: #930000; }

  .summary-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.92rem; }
  .summary-table th, .summary-table td { border: 1px solid var(--light-grey); padding: 8px 10px; text-align: left; }
  .summary-table th { background: var(--black); color: var(--white); font-family: 'Spectral', Georgia, serif; font-weight: 600; }
  .summary-table tr:nth-child(even) td { background: var(--warm-grey); }

  .score-badge {
    display: inline-block;
    background: var(--edgewood-red);

  .small-note { font-size: 0.85rem; color: var(--dark-web-grey); margin-top: 18px; text-align: center; }

    border: 2px solid var(--dark-web-grey);

<div class="accent-bar"></div>

<div class="wrap">
  <div id="app"></div>
</div>

<script>
// =================================================================
// CASE 2 DATA
// =================================================================
const VIGNETTE = "A 71-year-old patient with a history of hypertension and diabetes is admitted to the intensive care unit following an acute exacerbation of congestive heart failure. On the second day of admission, the patient reports new onset chest pressure radiating to the left arm, rated 7 out of 10. The bedside nurse administers acetaminophen per standing orders and reassesses 45 minutes later. The patient's pain has not improved and the nurse documents the complaint in the chart. A second-year resident reviews the chart remotely, orders a basic metabolic panel and cardiac enzymes, and notes the complaint. An EKG is obtained by the telemetry tech and transmitted to the system. The EKG reveals ST-elevation in leads II, III, and aVF, consistent with an acute inferior wall myocardial infarction. The result is available in the electronic health record for 38 minutes before anyone acts on it. The attending cardiologist is paged twice and does not respond. The resident does not attempt additional contact and does not activate the rapid response team or the facility's STEMI protocol. The nurse, aware that the cardiologist has not responded and that the patient's condition is worsening, does not escalate through available channels. The patient progresses to hemodynamic instability, a code blue is called, and the patient expires despite resuscitative efforts.";

const MANAGER_UPDATE = "During the review, the reviewer applied the Substitution Test, a Just Culture tool that asks: would most other nurses and residents in this same situation have made the same decision? The reviewer asked several staff members on this unit and on an adjacent unit what they would have done. Almost all reported that they would not have activated the rapid response team or the STEMI protocol, citing past experiences of negative repercussions from the cardiology attending when nurses or residents escalated past them. This pattern of fear-based deference is not unique to one individual. It reflects a systemic culture condition on this unit.";

// Step state
let step = "intro";
let requestedInfo = null;
let kctIndex = 0;

// CSA step state
let sentinelAnswer = null;
let sacSeverity = null;
let sacProbability = null;

// Deviation step state
let mainDeviationFound = false;

const app = document.getElementById('app');
const _caseStartTime = new Date();
let _attemptLog = [];
let _allAttempts = [];
let _lastAttemptSnapshot = null;
let _attemptStartTime = new Date();
var _pendingSelected = '';

function _captureSelected(btn) {
  _pendingSelected = btn.textContent.trim();
}

function _logResponse(stepName, fbHTML) {
  var alreadyLogged = _attemptLog.some(function(r){ return r.step === stepName; });
  if (alreadyLogged) return;
  var div = document.createElement('div');
  div.innerHTML = fbHTML || '';
  var cleanText = (div.textContent || div.innerText || '').trim();
  _attemptLog.push({ step: stepName, selected: _pendingSelected, feedback: cleanText });
}

function _buildAttemptLog() {
  var endTime = new Date();
  var elapsed = Math.round((endTime - _attemptStartTime) / 1000);
  var mins = Math.floor(elapsed / 60);
  var secs = elapsed % 60;
  return {
    finalClassification: 'SSE 1 — Death',
    taxonomyEventType: 'CM8.6 — Delayed Treatment (Care Management); Inpatient ICU',
    managerUpdateRequested: (typeof requestedInfo !== 'undefined' && requestedInfo) ? 'Yes' : 'No',
    sentinelEvent: (typeof sentinelAnswer !== 'undefined') ? (sentinelAnswer === 'yes' ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable') : 'Not applicable',
    sacSeverity: (typeof sacSeverity !== 'undefined' && sacSeverity) ? sacSeverity : 'Not applicable',
    sacProbability: (typeof sacProbability !== 'undefined' && sacProbability) ? sacProbability : 'Not applicable',
    startTime: _attemptStartTime.toLocaleString(),
    endTime: endTime.toLocaleString(),
    timeOnTask: mins + ' min ' + secs + ' sec',
    responses: _attemptLog.slice()
  };
}


// -----------------------------------------------------------------
// SHARED UTILITIES
// -----------------------------------------------------------------
function renderVignette() {
  return `<div class="vignette"><strong>The Event:</strong> ${VIGNETTE}</div>`;
}

function progressBar(stepNum, totalSteps, label) {
  const pct = Math.round((stepNum / totalSteps) * 100);
  return `
    <div class="progress-row">
      <span>${label}</span>
      <span>Step ${stepNum} of ${totalSteps}</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
  `;
}

// -----------------------------------------------------------------
// INTRO
// -----------------------------------------------------------------
function renderIntro() {
  app.innerHTML = `
    <div class="card">
      <span class="step-label">Case 2</span>
      <div class="intro-text">
        <p>You have reviewed your first event and are ready for the next one. You open Case 2 in your queue.</p>
        <p>Read the event below carefully. You will work through the same decision framework: identifying deviations, tracing whether the deviation reached the patient, scoring the harm, and determining whether a comprehensive systematic analysis is warranted.</p>
      </div>
      ${renderVignette()}
      <div class="nav-row">
        <button class="nav-btn show" id="next-btn">Begin Discussion</button>
      </div>
    </div>
  `;
  document.getElementById('next-btn').onclick = () => { step = "deviation"; render(); };
}

// -----------------------------------------------------------------
// STEP 1: DEVIATION IDENTIFICATION - ROUND 1
// -----------------------------------------------------------------
const DEVIATION_OPTIONS = [
  { key: "ekg-timing", label: "The EKG was not obtained in a timely manner", type: "factually-incorrect" },
  { key: "ekg-recognition", label: "The ST-elevation finding was not recognized by the care team", type: "factually-incorrect" },
  { key: "treatment-delay", label: "Treatment was not initiated despite a confirmed STEMI diagnosis available in the EHR for 38 minutes", type: "main" },
  { key: "cardiologist", label: "The cardiologist failed to respond to pages", type: "secondary" },
  { key: "none", label: "There was no deviation in Generally Accepted Performance Standards (GAPS)", type: "no-gaps" }
];

function renderDeviationStep() {
  mainDeviationFound = false;
  app.innerHTML = `
    ${progressBar(1, 5, "Discussion Point 1: Identifying Deviations")}
    <div class="card">
      <span class="step-label">Step 1 of 5</span>
      <h3 class="case-title">Were There Any Deviations?</h3>
      ${renderVignette()}
      <div class="question">Was there a deviation from Generally Accepted Performance Standards (GAPS) in this event? If so, where? Was there more than one?</div>
      <div class="helper-text">Review the event again and select the option that best represents the <em>main</em> deviation: the one most directly and causally connected to what happened to the patient.</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-row"><button class="nav-btn" id="next-btn">Continue</button></div>
    </div>
  `;
  const optionsDiv = document.getElementById('options');
  DEVIATION_OPTIONS.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.label;
    btn.onclick = () => handleDeviationAnswer(btn, opt, optionsDiv);
    optionsDiv.appendChild(btn);
  });
}

function handleDeviationAnswer(btn, opt, optionsDiv) {
  const allBtns = optionsDiv.querySelectorAll('button');
  allBtns.forEach(b => b.disabled = true);
  _captureSelected(btn);
  const feedbackDiv = document.getElementById('feedback');
  feedbackDiv.classList.add('show');
  const nextBtn = document.getElementById('next-btn');

  if (opt.type === "main") {
    btn.classList.add('selected-correct');
    feedbackDiv.classList.add('correct');
    feedbackDiv.innerHTML = `
      <span style="font-weight:700;">That identifies the proximate deviation well.</span> An EKG confirming an acute inferior wall myocardial infarction was available in the EHR for 38 minutes without triggering any intervention. The STEMI protocol was not activated, no escalation occurred, and treatment was not initiated. The standard of care for STEMI is well-established and time-critical: door-to-balloon time targets exist precisely because every minute of delay increases myocardial damage. The gap between what the evidence required and what actually happened is the GAPS deviation.
      <br><br>
      Now let's go one level deeper. The deviation is clear: treatment was delayed. But <em>why</em> did no one escalate when the cardiologist did not respond?
    `;
  _logResponse('Discussion Point 1: Deviation', feedbackDiv.innerHTML);
    mainDeviationFound = true;
    nextBtn.classList.add('show');
    nextBtn.textContent = "Explore Why Escalation Did Not Occur";
    nextBtn.onclick = () => { step = "deviation-round2"; render(); };

  } else if (opt.type === "secondary") {
    btn.classList.add('selected-redirect');
    feedbackDiv.classList.add('neutral');
    feedbackDiv.innerHTML = `
      <span style="font-weight:700;">The cardiologist's non-response is worth noting, and it is one part of this picture.</span> However, the attending's failure to respond is a contributing factor rather than the primary correctable system deviation. Have you thought about what happened in the 38 minutes after the EKG result was available? The STEMI diagnosis was confirmed and documented. What was the standard of care at that point, and what did the care team do with that information?
    `;
  _logResponse('Discussion Point 1: Deviation', feedbackDiv.innerHTML);
    nextBtn.classList.add('show');
    nextBtn.textContent = "Try Again";
    nextBtn.onclick = () => renderDeviationStep();

  } else if (opt.type === "factually-incorrect") {
    btn.classList.add('selected-redirect');
    feedbackDiv.classList.add('neutral');
    let detail = opt.key === "ekg-timing"
      ? "Looking back at the event: an EKG was obtained by the telemetry tech after the nurse documented the chest pain complaint. The timing of the EKG itself is not identified as a gap in this event."
      : "Looking back at the event: the ST-elevation was transmitted to the EHR and the result was available for 38 minutes. The finding was present and accessible in the record. The issue is not whether it was recognized, but what happened after it was.";
    feedbackDiv.innerHTML = `
      <span style="font-weight:700;">Let's go back to the event together.</span> ${detail}
      <br><br>
      Consider what was in place and functioning, and what was not. What changed between the EKG result being available and the patient going into cardiac arrest?
    `;
  _logResponse('Discussion Point 1: Deviation', feedbackDiv.innerHTML);
    nextBtn.classList.add('show');
    nextBtn.textContent = "Try Again";
    nextBtn.onclick = () => renderDeviationStep();

  } else if (opt.type === "no-gaps") {
    btn.classList.add('selected-redirect');
    feedbackDiv.classList.add('neutral');
    feedbackDiv.innerHTML = `
      <span style="font-weight:700;">Let's explore that conclusion together before we settle on it.</span> One useful tool when we are uncertain whether a GAPS deviation exists is the <strong>Known Complication Test</strong>. If the answer to all four questions is YES, the event is considered a known complication rather than a safety event. If the answer to any one of them is NO, we are looking at a safety event. Let's work through those questions and see where this case lands.
    `;
  _logResponse('Discussion Point 1: Deviation', feedbackDiv.innerHTML);
    nextBtn.classList.add('show');
    nextBtn.textContent = "Apply the Known Complication Test";
    nextBtn.onclick = () => { kctIndex = 0; step = "kct"; render(); };
  }
}

// -----------------------------------------------------------------
// STEP 1 ROUND 2: WHY DID ESCALATION NOT OCCUR?
// -----------------------------------------------------------------
const CULTURE_OPTIONS = [
  { key: "staffing", label: "A staffing shortage meant no one was available to escalate", type: "incorrect" },
  { key: "ehr", label: "Poor EHR design prevented timely notification of the care team", type: "incorrect" },
  { key: "hierarchy", label: "Hierarchical deference: staff did not feel psychologically safe escalating past an unresponsive attending", type: "main" },
  { key: "protocol", label: "The resident was unfamiliar with the STEMI protocol", type: "partial" }
];

function renderDeviationRound2() {
  app.innerHTML = `
    ${progressBar(1, 5, "Discussion Point 1: Identifying Deviations")}
    <div class="card">
      <span class="step-label">Step 1 of 5 &middot; Exploring the System Factors</span>
      <h3 class="case-title">Why Did Escalation Not Occur?</h3>
      ${renderVignette()}
      <div class="feedback show correct" style="margin-bottom:16px;">
        <span style="font-weight:700;">The proximate deviation is identified.</span> Treatment was not initiated despite a confirmed STEMI diagnosis in the EHR. Now consider what lies beneath that. When the cardiologist did not respond, what stopped the resident and nurse from activating the rapid response team or the STEMI protocol?
      </div>
      <div class="question">Which of the following best describes the system or culture factor that contributed to the failure to escalate?</div>
      <div class="helper-text">Consider what the care team knew, what options were available to them, and what may have influenced their decision not to use those options.</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-row"><button class="nav-btn" id="next-btn">Continue to Discussion Point 2</button></div>
    </div>
  `;
  const optionsDiv = document.getElementById('options');
  CULTURE_OPTIONS.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.label;
    btn.onclick = () => handleCultureAnswer(btn, opt, optionsDiv);
    optionsDiv.appendChild(btn);
  });
}

function handleCultureAnswer(btn, opt, optionsDiv) {
  const allBtns = optionsDiv.querySelectorAll('button');
  allBtns.forEach(b => b.disabled = true);
  _captureSelected(btn);
  const feedbackDiv = document.getElementById('feedback');
  feedbackDiv.classList.add('show');
  const nextBtn = document.getElementById('next-btn');

  if (opt.type === "main") {
    btn.classList.add('selected-correct');
    feedbackDiv.classList.add('correct');
    feedbackDiv.innerHTML = `
      <span style="font-weight:700;">This is the culture-level factor at the root of this event.</span>
      <br><br>
      What you are describing is <strong>hierarchical deference</strong>, a pattern in which staff defer to authority rather than act on their own clinical judgment, particularly when doing so might invite criticism or repercussion from a more senior clinician.
      <br><br>
      Two frameworks help explain this:
      <br><br>
      <strong>Westrum's Cultural Typology</strong> distinguishes between generative, bureaucratic, and pathological organizational cultures. In a <em>pathological</em> culture, messengers are shot, failure is punished, and new ideas are actively crushed. In a <em>generative</em> culture, failure leads to inquiry, safety is the shared responsibility of everyone, and speaking up is rewarded. A unit where nurses and residents fear repercussions for escalating past an attending is exhibiting pathological culture characteristics. That culture is not a background condition: it is an active patient safety hazard.
      <br><br>
      <strong>Amy Edmondson's Psychological Safety framework</strong> defines psychological safety as the shared belief that the team is safe for interpersonal risk-taking, including speaking up, asking questions, and challenging authority. When psychological safety is absent, staff suppress clinical concerns rather than risk social or professional consequences. That suppression, in this case, contributed directly to a patient's death.
      <br><br>

          <li><strong>Occasional:</strong> May happen several times in 1 to 2 years</li>
          <li><strong>Uncommon:</strong> May happen sometime in 2 to 5 years</li>
          <li><strong>Remote:</strong> May happen sometime in 5 to 30 years</li>
        </ul>
        <em>Scenario context: At your organization, STEMI-related deaths associated with delayed escalation occur occasionally.</em>
      </div>
      <div class="question">How would you classify the <strong>severity</strong> of this event?</div>
      <div class="options" id="severity-options"></div>
      <div class="feedback" id="severity-feedback"></div>
      <div id="probability-section" style="display:none; margin-top:22px;">
        <div class="question">How would you classify the <strong>probability</strong> of this type of event at your organization?</div>
        <div class="helper-text">Use the scenario context provided above.</div>
        <div class="options" id="probability-options"></div>
        <div class="feedback" id="probability-feedback"></div>
      </div>
      <div id="matrix-result" style="display:none; margin-top:22px;"></div>
      <div class="nav-row"><button class="nav-btn" id="next-btn">See Final Summary</button></div>
    </div>
  `;

  const sevOptions = document.getElementById('severity-options');
  [
    { val: 'catastrophic', label: 'Catastrophic' },
    { val: 'major', label: 'Major' },
    { val: 'moderate', label: 'Moderate' },
    { val: 'minor', label: 'Minor' }
  ].forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.label;
    btn.onclick = () => handleSeverityAnswer(btn, opt.val, sevOptions);
    sevOptions.appendChild(btn);
  });
}

function handleSeverityAnswer(btn, val, sevOptions) {
  const allBtns = sevOptions.querySelectorAll('button');
  allBtns.forEach(b => { b.disabled = true; });
  _captureSelected(btn);
  sacSeverity = val;
  const feedbackDiv = document.getElementById('severity-feedback');
  feedbackDiv.classList.add('show');

  if (val === 'catastrophic') {
    btn.classList.add('selected-correct');
    feedbackDiv.classList.add('correct');
    feedbackDiv.innerHTML = `
      <span style="font-weight:700;">Catastrophic is the right category here.</span> Death is the clearest example of Catastrophic severity in the SAC Matrix, and the RCA2 framework also notes that any JC sentinel event should be considered Catastrophic. This event meets both criteria simultaneously.
    `;
  _logResponse('Discussion Point 4: SAC Severity', feedbackDiv.innerHTML);
    showProbabilitySection();
  } else {
    btn.classList.add('selected-redirect');
    feedbackDiv.classList.add('neutral');
    feedbackDiv.innerHTML = `
      <span style="font-weight:700;">Let's look at the severity definitions again.</span> The SAC Matrix defines Catastrophic as including death, and also explicitly includes any JC sentinel event. This patient expired. How does that compare to the category descriptions? Take another look and reconsider.
    `;
  _logResponse('Discussion Point 4: SAC Severity', feedbackDiv.innerHTML);
    allBtns.forEach(b => { b.disabled = false; });
  _captureSelected(btn);
    btn.disabled = true;
  }
}

function showProbabilitySection() {
  const section = document.getElementById('probability-section');
  section.style.display = 'block';
  const probOptions = document.getElementById('probability-options');
  [
    { val: 'frequent', label: 'Frequent (several times per year)' },
    { val: 'occasional', label: 'Occasional (several times in 1 to 2 years)' },
    { val: 'uncommon', label: 'Uncommon (sometime in 2 to 5 years)' },
    { val: 'remote', label: 'Remote (sometime in 5 to 30 years)' }
  ].forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.label;
    btn.onclick = () => handleProbabilityAnswer(btn, opt.val, probOptions);
    probOptions.appendChild(btn);
  });
}

function handleProbabilityAnswer(btn, val, probOptions) {
  const allBtns = probOptions.querySelectorAll('button');
  allBtns.forEach(b => b.disabled = true);
  _captureSelected(btn);
  sacProbability = val;
  btn.classList.add('selected-correct');
  const feedbackDiv = document.getElementById('probability-feedback');
  feedbackDiv.classList.add('show', 'neutral');
  let probNote = val === 'occasional'
    ? "Occasional aligns with the scenario context. Note that at Catastrophic severity, the SAC score is 3 regardless of which probability category applies."
    : "The scenario context suggests Occasional is the closest fit. That said, the important teaching point here is that at Catastrophic severity, any probability category produces a SAC score of 3.";
  feedbackDiv.innerHTML = `<span style="font-weight:700;">Probability noted.</span> ${probNote}`;
  _logResponse('Discussion Point 4: SAC Probability', feedbackDiv.innerHTML);
  showMatrixResult();
}

function showMatrixResult() {
  const resultDiv = document.getElementById('matrix-result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = `
    <div class="reference-box" style="border-left:4px solid var(--edgewood-red);">
      <strong>SAC Matrix Result: Score of 3 (Highest Risk)</strong><br><br>
      Catastrophic severity paired with any probability category produces a SAC score of 3. A score of 3 indicates that a comprehensive systematic analysis is warranted and organizational resources should be allocated accordingly.
      <br><br>
      <table class="summary-table" style="margin-top:8px; font-size:0.85rem;">
        <tr><th></th><th>Catastrophic</th><th>Major</th><th>Moderate</th><th>Minor</th></tr>
        <tr><td><strong>Frequent</strong></td><td style="background:#fdeaea; font-weight:700; text-align:center;">3</td><td style="text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td></tr>
        <tr><td><strong>Occasional</strong></td><td style="background:#fdeaea; font-weight:700; text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr>
        <tr><td><strong>Uncommon</strong></td><td style="background:#fdeaea; font-weight:700; text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr>
        <tr><td><strong>Remote</strong></td><td style="background:#fdeaea; font-weight:700; text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td><td style="text-align:center;">1</td></tr>
      </table>
    </div>
    <div class="feedback show neutral" style="margin-top:16px;">
      <span style="font-weight:700;">Before moving on, one more dimension to keep in mind.</span> The SAC Matrix guides resource allocation, but your organization's own policies and accreditation requirements operate alongside it. For Joint Commission-accredited organizations, this event independently triggers a CSA requirement as a sentinel event. Always verify what your accreditation body and internal policies require.
    </div>
  `;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.add('show');
  nextBtn.textContent = "See Final Summary";
  nextBtn.onclick = () => { step = "summary"; render(); };
}

// -----------------------------------------------------------------
// FINAL SUMMARY
// -----------------------------------------------------------------
function renderSummary() {
  const _currentAttemptSnapshot = _buildAttemptLog();
  _lastAttemptSnapshot = _currentAttemptSnapshot;
  var _snapshotToSend = _currentAttemptSnapshot;
  var _allToSend = _allAttempts.concat([_snapshotToSend]);

  app.innerHTML = `
    ${progressBar(5, 5, "Final Summary")}
    <div class="card" style="text-align:center;">
      <span class="step-label">Case 2 Complete</span>
      <h3 class="case-title">Final SEC Classification</h3>
      <div class="score-badge">SSE 1</div>
      <p>Death</p>
      <table class="summary-table" style="text-align:left;">
        <tr><th>Discussion Point</th><th>Conclusion</th></tr>
<tr><td>Taxonomy Event Type</td><td>CM8.6 &mdash; Delayed Treatment (Care Management); Inpatient ICU</td></tr>
        <tr><td>Deviation from GAPS?</td><td>Yes &mdash; treatment was not initiated despite a confirmed STEMI diagnosis available in the EHR for 38 minutes</td></tr>
        <tr><td>Contributing culture factor</td><td>Hierarchical deference rooted in absent psychological safety (Westrum; Edmondson)</td></tr>
        <tr><td>Did the deviation reach the patient?</td><td>Yes &mdash; no barrier intervened between the confirmed diagnosis and the patient's death</td></tr>
        <tr><td>Additional information requested?</td><td>${requestedInfo ? "Yes &mdash; Substitution Test finding revealed a systemic culture of fear-based deference on this unit" : "No"}</td></tr>
        <tr><td>Level of harm</td><td>SSE 1 &mdash; Death</td></tr>
        <tr><td>SEC Classification</td><td>Serious Safety Event</td></tr>
        <tr><td>Sentinel event per JC?</td><td>Yes &mdash; death of a patient meets JC sentinel event criteria (July 2026)</td></tr>
        <tr><td>SAC Matrix score</td><td>3 (Catastrophic severity, any probability) &mdash; CSA warranted</td></tr>
      </table>

      ${!requestedInfo ? `
      <div class="feedback show neutral" style="text-align:left; margin-top:20px;">
        <span style="font-weight:700;">Something worth reflecting on as you close this case.</span> The harm level here, SSE 1 (Death), is documented clearly in the vignette itself. This is different from Case 1, where the final classification depended on follow-up information about the patient's recovery. Part of developing skill as a reviewer is recognizing when the information in hand is sufficient and when it is not. In this case, the outcome was unambiguous from the initial report.
        <br><br>
        However, not requesting the manager update means missing the Substitution Test finding, which reveals that this culture condition is widespread across the unit and not isolated to one individual. That finding would be essential to a complete CSA.
      </div>` : ''}

      <div class="feedback show neutral" style="text-align:left; margin-top:20px;">
        <span style="font-weight:700;">A note on second victim syndrome.</span> Before closing this case, consider the human dimension. The resident and nurse involved in this event will likely experience what researchers call second victim syndrome: a state of traumatic stress, guilt, self-doubt, and emotional distress that clinicians often experience after a patient safety event occurs on their watch. These are individuals who came to work to provide safe, compassionate care. They made decisions in a culture that constrained their options, and a patient died. The organizational response to this event must include attending to their wellbeing, not only analyzing the system failures. A just culture and a psychologically safe environment are not only preventive measures: they are also part of how organizations care for their people after harm occurs.
      </div>
      <button class="restart-btn" id="restart-btn">Restart Case 2</button>
    </div>
  `;
  
  // Send completion data to parent shell
  setTimeout(function(){
    var endTime = new Date();
    var elapsed = Math.round((endTime - _caseStartTime) / 1000);
    var mins = Math.floor(elapsed / 60);
    var secs = elapsed % 60;
    var timeStr = mins + ' min ' + secs + ' sec';
    window.parent.postMessage({
      type: 'case-complete',
      caseNum: 2,
      log: {
        finalClassification: 'SSE 1 — Death',
        taxonomyEventType: 'CM8.6 — Delayed Treatment (Care Management)',
        managerUpdateRequested: (typeof requestedInfo !== 'undefined' && requestedInfo) ? 'Yes' : 'No',
        sentinelEvent: (typeof sentinelAnswer !== 'undefined' && sentinelAnswer === 'yes') ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable',
        sacSeverity: (typeof sacSeverity !== 'undefined' && sacSeverity) ? sacSeverity : 'Not applicable',
        sacProbability: (typeof sacProbability !== 'undefined' && sacProbability) ? sacProbability : 'Not applicable',
        startTime: _caseStartTime.toLocaleString(),
        endTime: endTime.toLocaleString(),
        timeOnTask: timeStr
      }
    }, '*');
  }, 100);
  document.getElementById('restart-btn').onclick = () => {
    requestedInfo = null;
    kctIndex = 0;
    sentinelAnswer = null;
    sacSeverity = null;
    sacProbability = null;
    mainDeviationFound = false;
    
    if (_lastAttemptSnapshot) { _allAttempts.push(_lastAttemptSnapshot); _lastAttemptSnapshot = null; }
    _attemptLog = [];
    _attemptStartTime = new Date();
    step = "intro";
    render();
  };
}

// -----------------------------------------------------------------
// ROUTER
// -----------------------------------------------------------------
function render() {
  if (step === "intro") renderIntro();
  else if (step === "deviation") renderDeviationStep();
  else if (step === "deviation-round2") renderDeviationRound2();
  else if (step === "kct") renderKctStep();
  else if (step === "reach") renderReachStep();
  else if (step === "harm-info") renderHarmInfoStep();
  else if (step === "harm-level") renderHarmLevelStep();
  else if (step === "csa") renderCsaSentinelStep();
  else if (step === "summary") renderSummary();
}

render();
</script>
