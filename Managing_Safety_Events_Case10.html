<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Managing Safety Events: Case 10</title>
<style>
  :root{--edgewood-red:#BB0000;--black:#000000;--white:#FFFFFF;--dark-gold:#C8932B;--warm-grey:#F0EEEB;--dark-web-grey:#58595B;--slate-blue:#5794AD;--light-grey:#C2C6C8;}
  *{box-sizing:border-box;}body{font-family:'Source Sans Pro',Arial,sans-serif;background:var(--warm-grey);color:var(--black);margin:0;padding:0;line-height:1.6;}
  .wrap{max-width:860px;margin:0 auto;padding:24px 20px 60px;}
  header{background:var(--black);color:var(--white);padding:28px 20px;text-align:center;}
  header h1{font-family:'Spectral',Georgia,serif;margin:0 0 6px;font-size:1.7rem;letter-spacing:.5px;}
  header p{margin:0;color:var(--light-grey);font-size:.95rem;}
  .accent-bar{height:6px;background:var(--edgewood-red);}
  .card{background:var(--white);border:1px solid var(--light-grey);border-radius:6px;padding:24px;margin-top:24px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
  .progress-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;margin-bottom:4px;font-size:.9rem;color:var(--dark-web-grey);}
  .progress-bar-bg{background:var(--light-grey);border-radius:4px;height:8px;overflow:hidden;margin-bottom:4px;}
  .progress-bar-fill{background:var(--edgewood-red);height:100%;transition:width .3s ease;}
  .step-label{display:inline-block;background:var(--dark-gold);color:var(--white);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:3px;margin-bottom:12px;}
  .case-title{font-family:'Spectral',Georgia,serif;font-size:1.4rem;margin:0 0 14px;color:var(--black);}
  .vignette{background:var(--warm-grey);border-left:4px solid var(--slate-blue);padding:16px 18px;border-radius:4px;margin-bottom:18px;font-size:1rem;}
  .question{font-weight:700;margin-bottom:4px;font-size:1.05rem;}
  .helper-text{font-size:.92rem;color:var(--dark-web-grey);margin:6px 0 14px;}
  .reference-box{background:var(--warm-grey);border:1px solid var(--light-grey);border-radius:4px;padding:12px 16px;margin-bottom:16px;font-size:.88rem;color:var(--dark-web-grey);}
  .reference-box strong{color:var(--black);}
  .reference-box ul{margin:8px 0 0;padding-left:18px;}
  .reference-box li{margin-bottom:4px;}
  .info-box{background:#fff8e6;border:1px solid var(--dark-gold);border-left:4px solid var(--dark-gold);border-radius:4px;padding:14px 16px;margin:16px 0;font-size:.95rem;}
  .info-box strong{display:block;margin-bottom:4px;color:var(--dark-gold);}
  .options{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;}
  .opt-btn{flex:1 1 220px;background:var(--white);border:2px solid var(--slate-blue);color:var(--black);font-family:inherit;font-size:.98rem;font-weight:600;padding:14px 18px;border-radius:5px;cursor:pointer;transition:all .15s ease;text-align:left;}
  .opt-btn:hover{background:var(--slate-blue);color:var(--white);}
  .opt-btn.selected-correct{background:#2e7d32;border-color:#2e7d32;color:var(--white);}
  .opt-btn.selected-redirect{background:var(--edgewood-red);border-color:var(--edgewood-red);color:var(--white);}
  .opt-btn:disabled{cursor:default;opacity:1;}
  .opt-btn:disabled:not(.selected-correct):not(.selected-redirect){opacity:.45;}
  .feedback{margin-top:18px;padding:16px 18px;border-radius:5px;font-size:.97rem;display:none;}
  .feedback.show{display:block;animation:fadein .25s ease;}
  .feedback.correct{background:#eaf5ea;border-left:4px solid #2e7d32;}
  .feedback.neutral{background:var(--warm-grey);border-left:4px solid var(--slate-blue);}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .nav-row{display:flex;justify-content:flex-end;margin-top:22px;}
  .nav-btn{background:var(--edgewood-red);color:var(--white);border:none;font-family:inherit;font-size:1rem;font-weight:700;padding:12px 28px;border-radius:5px;cursor:pointer;display:none;}
  .nav-btn.show{display:inline-block;}
  .nav-btn:hover{background:#930000;}
  .summary-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.92rem;}
  .summary-table th,.summary-table td{border:1px solid var(--light-grey);padding:8px 10px;text-align:left;}
  .summary-table th{background:var(--black);color:var(--white);font-family:'Spectral',Georgia,serif;font-weight:600;}
  .summary-table tr:nth-child(even) td{background:var(--warm-grey);}
  .score-badge{display:inline-block;background:var(--edgewood-red);color:var(--white);font-family:'Spectral',Georgia,serif;font-size:1.6rem;font-weight:700;padding:14px 28px;border-radius:6px;margin:14px 0;}
  .small-note{font-size:.85rem;color:var(--dark-web-grey);margin-top:18px;text-align:center;}
  .restart-btn{background:transparent;border:2px solid var(--dark-web-grey);color:var(--dark-web-grey);font-family:inherit;font-weight:700;padding:10px 22px;border-radius:5px;cursor:pointer;margin-top:18px;}
  .restart-btn:hover{background:var(--dark-web-grey);color:var(--white);}

/* ── Resource Page Header ── */

    background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);

    display: flex;

}
.resource-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #BB0000 0%, #BB0000 33%, #C8932B 33%, #C8932B 66%, #5794AD 66%, #5794AD 100%);
}
.resource-header-logo {
    height: 40px;
    width: auto;
    border-radius: 4px;
    flex-shrink: 0;
}
.resource-header-text {
    flex: 1;
    min-width: 0;
}
.resource-header-course {
    font-family: 'Source Sans 3', 'Source Sans Pro', sans-serif;
    font-size: 0.65rem;

.resource-footer {

    .resource-header {
        flex-wrap: wrap;

    }

  .next-case-btn{background:var(--slate-blue);color:var(--white);border:none;font-family:inherit;font-weight:700;padding:10px 22px;border-radius:5px;cursor:pointer;margin-top:18px;margin-left:12px;}
  .next-case-btn:hover{background:#3e7a99;}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="wrap"><div id="app"></div></div>
<script>
const VIGNETTE = "A resident in a long-term care facility has left-sided weakness resulting from a prior stroke and has been formally identified as high fall risk. The facility does not use bed alarms as a matter of policy; clinical evidence indicated that bed alarms increased confusion and distress among residents with cognitive impairment, and the decision was made to address fall prevention through other means. A facility volunteer returned the resident to his room after accompanying him to an outside physician appointment. She raised his side rails and placed his call bell within reach, then left the room without notifying the nursing staff that he had returned. Approximately 30 minutes later, the resident got out of bed unassisted to use the bathroom, fell, and sustained an injury to his right wrist. He was seen by the nursing staff, and the wrist was splinted for two weeks to stabilize the injury while it healed. He experienced difficulty completing activities of daily living requiring additional nursing assistance during the recovery period. He returned to his prior functional baseline after the splint was removed.";
const MANAGER_UPDATE = "Per the director of nursing's follow-up, the resident recovered fully after the splint was removed and returned to his prior functional baseline. A review of the facility's volunteer protocol reveals that while volunteers are trained to assist residents with transportation, there is no documented requirement for them to notify nursing staff when returning a resident designated as high fall risk. The nursing staff were unaware the resident had returned to his room until he was found on the floor. Three similar events involving volunteers returning high-fall-risk residents without nursing notification have occurred in the past 18 months.";

let step="intro",requestedInfo=null,kctIndex=0,sentinelAnswer=null,sacSeverity=null,sacProbability=null;
const app=document.getElementById('app');
const _caseStartTime = new Date();
let _attemptLog = [];
let _allAttempts = [];
let _lastAttemptSnapshot = null;
let _attemptStartTime = new Date();
var _pendingSelected = '';

function _captureSelected(btn) {
  _pendingSelected = btn.textContent.trim();
}

function _logResponse(stepName, fbHTML) {
  var alreadyLogged = _attemptLog.some(function(r){ return r.step === stepName; });
  if (alreadyLogged) return;
  var div = document.createElement('div');
  div.innerHTML = fbHTML || '';
  var cleanText = (div.textContent || div.innerText || '').trim();
  _attemptLog.push({ step: stepName, selected: _pendingSelected, feedback: cleanText });
}

function _buildAttemptLog() {
  var endTime = new Date();
  var elapsed = Math.round((endTime - _attemptStartTime) / 1000);
  var mins = Math.floor(elapsed / 60);
  var secs = elapsed % 60;
  return {
    finalClassification: 'SSE 5 — Moderate Temporary Harm',
    taxonomyEventType: 'EE3 — Fall (Environmental); Long-Term Care',
    managerUpdateRequested: (typeof requestedInfo !== 'undefined' && requestedInfo) ? 'Yes' : 'No',
    sentinelEvent: (typeof sentinelAnswer !== 'undefined') ? (sentinelAnswer === 'yes' ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable') : 'Not applicable',
    sacSeverity: (typeof sacSeverity !== 'undefined' && sacSeverity) ? sacSeverity : 'Not applicable',
    sacProbability: (typeof sacProbability !== 'undefined' && sacProbability) ? sacProbability : 'Not applicable',
    startTime: _attemptStartTime.toLocaleString(),
    endTime: endTime.toLocaleString(),
    timeOnTask: mins + ' min ' + secs + ' sec',
    responses: _attemptLog.slice()
  };
}
function vign(){return `<div class="vignette"><strong>The Event:</strong> ${VIGNETTE}</div>`;}
function pb(n,t,l){return `<div class="progress-row"><span>${l}</span><span>Step ${n} of ${t}</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round(n/t*100)}%;"></div></div>`;}



function renderIntro(){
  app.innerHTML=`<div class="card"><span class="step-label">Case 10</span><div style="font-size:1.05rem;margin-bottom:16px;"><p>You open the next event: a fall reported from a long-term care facility involving a volunteer and a high-fall-risk resident.</p><p>Read the event carefully. This case includes an organizational policy decision that is relevant to your analysis.</p></div>${vign()}<div class="nav-row"><button class="nav-btn show" id="nb">Begin Discussion</button></div></div>`;
  document.getElementById('nb').onclick=()=>{step="deviation";render();};
}

function renderDeviationStep(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Identifying Deviations")}<div class="card"><span class="step-label">Step 1 of 5</span><h3 class="case-title">Were There Any Deviations?</h3>${vign()}<div class="reference-box"><strong>A note on the no-alarm policy:</strong> The facility's decision not to use bed alarms is a deliberate, evidence-informed organizational policy. It is not a GAPS deviation. When an organization makes a deliberate policy decision based on clinical evidence, that decision itself is not a safety event. However, that decision creates a context in which other compensatory safeguards become more important. Identifying what those compensatory safeguards are, and whether they were followed, is the analysis task.</div><div class="question">Was there a deviation from Generally Accepted Performance Standards (GAPS) in this event? Select the option that best represents the main deviation.</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  [
    {key:"notify",label:"The volunteer did not notify nursing staff that a high-fall-risk resident had been returned to his room, and no protocol existed requiring her to do so",type:"main"},
    {key:"alarm",label:"The facility's decision not to use bed alarms was the cause of this fall",type:"incorrect"},
    {key:"volunteer",label:"The volunteer should not have been involved in returning a high-fall-risk resident to his room",type:"secondary"},
    {key:"none",label:"There was no deviation in Generally Accepted Performance Standards (GAPS)",type:"no-gaps"}
  ].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleDev(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleDev(btn,opt){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.type==="main"){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">That captures the deviation in this event well.</span> The volunteer completed her role in accompanying and returning the resident, but left the room without notifying the nursing staff. In a facility that does not use bed alarms, the nursing staff's awareness of a high-fall-risk resident's location and status is especially critical, because there is no electronic signal to alert them when the resident moves. The absence of a notification in that environment is the gap that allowed 30 minutes to pass without anyone knowing the resident was unsupervised. Critically, the manager's update tells us there was no protocol requiring volunteers to make this notification. The deviation is not only in what the volunteer did: it is in the system that did not define what she was required to do.`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Continue to Discussion Point 2";
    nb.onclick=()=>{step="reach";render();};
  } else if(opt.type==="incorrect"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's look at the no-alarm policy more carefully.</span> The facility made a deliberate, evidence-informed decision not to use bed alarms because they increased confusion and distress among residents with cognitive impairment. That decision is within the organization's clinical authority and is not itself a GAPS deviation. Have you thought about what safeguards should exist in place of bed alarms for high-fall-risk residents, and whether those safeguards were in place and followed?`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>renderDeviationStep();
  } else if(opt.type==="secondary"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">The scope of the volunteer's role is worth examining as a contributing factor.</span> However, the event does not indicate that a volunteer accompanying a resident to an appointment is outside accepted practice. The more direct question is: what should happen at the moment the volunteer returns the resident to his room, particularly given his fall risk designation? Have you thought about what the expected handoff process should look like and whether it occurred?`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>renderDeviationStep();
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's explore that conclusion together before we settle on it.</span> The Known Complication Test can help us think through whether this outcome was a known complication rather than a safety event. Let's work through those four questions.`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Apply the Known Complication Test";
    nb.onclick=()=>{kctIndex=0;step="kct";render();};
  }
}

const KCT_QS=[
  {text:"Was the activity (accompanying a high-fall-risk resident to a physician appointment and returning him to his room) appropriate or warranted?",answer:"YES"},
  {text:"Was the complication (fall resulting in wrist injury) a known risk for this resident, and was the standard of care employed to mitigate that risk upon his return?",answer:"NO"},
  {text:"Was the complication identified in a timely manner?",answer:"YES"},
  {text:"Was the complication treated according to the standard of care, in a timely manner?",answer:"YES"}
];

function renderKctStep(){
  if(kctIndex>=KCT_QS.length){renderKctResult();return;}
  const q=KCT_QS[kctIndex];
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Known Complication Test")}<div class="card"><span class="step-label">Known Complication Test &middot; Question ${kctIndex+1} of 4</span><h3 class="case-title">Is This a Known Complication or a Safety Event?</h3>${vign()}<div class="reference-box"><strong>Reminder:</strong> ALL four YES = Known Complication. ANY NO = safety event.</div><div class="question">${q.text}</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  ['YES','NO'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.style.flex="1 1 100px";btn.textContent=val;
    btn.onclick=()=>handleKct(btn,val,q);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleKct(btn,val,q){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const isC=val===q.answer;
  btn.classList.add(isC?'selected-correct':'selected-redirect');
  if(!isC)document.querySelectorAll('#opts .opt-btn').forEach(b=>{if(b.textContent===q.answer)b.classList.add('selected-correct');});
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show',isC?'correct':'neutral');
  const notes=[
    ["Accompanying a resident to an outside appointment and returning him to his room is appropriate and consistent with the volunteer's role in this facility.","Think about whether escorting this resident to an appointment is appropriate given his needs and the facility's volunteer program. It is, pointing toward YES."],
    ["A fall is a known risk for this resident: he is formally designated as high fall risk due to left-sided weakness. The standard of care mitigation upon return, notifying nursing staff so they could monitor him, was not employed. The mitigation step was absent, pointing to NO.","Consider both parts of this question. A fall was a known risk. But was the standard of care employed to mitigate that risk when he was returned to his room? In a facility without bed alarms, nursing notification is the key compensatory safeguard. It did not happen, pointing to NO."],
    ["The resident was found on the floor and nursing staff responded. The fall was identified during the same event period.","The fall was discovered and the resident received prompt assessment and care. That is timely identification, pointing toward YES."],
    ["The wrist was assessed, splinted, and the resident received appropriate nursing support during the two-week recovery. That is consistent with the standard of care for this type of injury in a long-term care setting.","Splinting and nursing support during recovery is the appropriate care for a wrist injury in this setting. This points toward YES."]
  ];
  const[c,i]=notes[kctIndex];
  fb.innerHTML=`<span style="font-weight:700;">${isC?"That aligns with the evidence in the event.":"Let's think through this one together."}</span> ${isC?c:i}`;
  _logResponse('KCT Question ' + (typeof kctIndex !== 'undefined' ? kctIndex + 1 : ''), fb.innerHTML);
  const nb=document.getElementById('nb');nb.classList.add('show');
  nb.onclick=()=>{kctIndex++;renderKctStep();};
}

function renderKctResult(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Known Complication Test")}<div class="card"><span class="step-label">Known Complication Test &middot; Result</span><h3 class="case-title">What Does This Tell Us?</h3><div class="feedback show neutral"><span style="font-weight:700;">One of the four answers came back NO.</span> This is a safety event. Let's go back and identify the deviation.</div><div class="nav-row"><button class="nav-btn show" id="nb">Return to Discussion Point 1</button></div></div>`;
  document.getElementById('nb').onclick=()=>{step="deviation";render();};
}

function renderReachStep(){
  app.innerHTML=`${pb(2,5,"Discussion Point 2: Did the Deviation Reach the Patient?")}<div class="card"><span class="step-label">Step 2 of 5</span><h3 class="case-title">Did the Deviation Reach the Patient?</h3>${vign()}<div class="question">Did the deviation reach the patient in this event?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Discussion Point 3</button></div></div>`;
  ['Yes, it reached the patient','No, a barrier caught it first'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=val;
    btn.onclick=()=>handleReach(btn,val);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleReach(btn,val){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const isC=val==='Yes, it reached the patient';
  btn.classList.add(isC?'selected-correct':'selected-redirect');
  if(!isC)document.querySelectorAll('#opts .opt-btn').forEach(b=>{if(b.textContent==='Yes, it reached the patient')b.classList.add('selected-correct');});
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  if(isC){fb.classList.add('correct');fb.innerHTML=`<span style="font-weight:700;">That is a sound read of this situation.</span> No barrier intercepted the gap in notification. Nursing staff were unaware the resident had returned. Without that awareness, no one could initiate the monitoring or redirection that might have prevented him from attempting to get up unassisted. The deviation reached the patient directly.`;
  _logResponse('Discussion Point 2: Reach', fb.innerHTML);}
  else{fb.classList.add('neutral');fb.innerHTML=`<span style="font-weight:700;">Let's think about what a catch would have looked like here.</span> A catch would have required nursing staff to know the resident had returned so they could monitor him or redirect him to a safer option for toileting. That awareness never happened. Thirty minutes passed, the resident got up alone, and fell. The deviation reached the patient without any intervention.`;
  _logResponse('Discussion Point 2: Reach', fb.innerHTML);}
  const nb=document.getElementById('nb');nb.classList.add('show');
  nb.onclick=()=>{step="harm-info";render();};
}

function renderHarmInfoStep(){
  app.innerHTML=`${pb(3,5,"Discussion Point 3: Level of Harm")}<div class="card"><span class="step-label">Step 3 of 5</span><h3 class="case-title">What Was the Level of Harm?</h3>${vign()}<div class="question">Before scoring the level of harm, do you need more information?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  ['Yes, request more information from the manager/designee','No, proceed with the information available'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=val;
    btn.onclick=()=>handleHarmInfo(btn,val);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleHarmInfo(btn,val){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  btn.classList.add('selected-correct');
  requestedInfo=val.startsWith('Yes');
  const fb=document.getElementById('fb');fb.classList.add('show','neutral');
  const nb=document.getElementById('nb');nb.classList.add('show');
  if(requestedInfo){
    fb.innerHTML=`<span style="font-weight:700;">Reaching out for more information is sound practice.</span> The vignette tells us the resident recovered to his prior functional baseline, but confirming the full trajectory and any system context is good practice. You contact the director of nursing.<div class="info-box"><strong>Manager/Designee Update</strong>${MANAGER_UPDATE}</div>`;
  _logResponse('Discussion Point 3: Request Info?', fb.innerHTML);
  } else {
    fb.innerHTML=`<span style="font-weight:700;">Proceeding with the documented information is reasonable.</span> The vignette tells us the resident sustained a wrist injury requiring a splint for two weeks, needed additional nursing assistance during recovery, and returned to his prior baseline. Let's score based on what is documented.`;
  _logResponse('Discussion Point 3: Request Info?', fb.innerHTML);
  }
  nb.onclick=()=>{step="harm-level";render();};
}

function renderHarmLevelStep(){
  const rem=requestedInfo?`<div class="info-box"><strong>Manager/Designee Update</strong>${MANAGER_UPDATE}</div>`:"";
  app.innerHTML=`${pb(3,5,"Discussion Point 3: Level of Harm")}<div class="card"><span class="step-label">Step 3 of 5</span><h3 class="case-title">Score the Level of Harm</h3>${vign()}${rem}<div class="reference-box"><strong>SEC Levels of Harm:</strong><ul><li><strong>SSE 5</strong> &mdash; Moderate Temporary Harm: significant harm requiring a higher level of care, monitoring, or a minor procedure to resolve; no permanent residual</li><li><strong>PSE 2</strong> &mdash; Minor Temporary Harm: minimal harm, time-limited, little or no intervention required</li><li><strong>PSE 1</strong> &mdash; Minor Permanent Harm: minimal harm with no expected change in clinical status</li></ul>Assign based on actual patient outcome.</div><div class="question">How would you classify the level of harm in this event?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Discussion Point 4</button></div></div>`;
  [{key:"sse5",label:"Moderate Temporary Harm (SSE 5)"},{key:"pse2",label:"Minor Temporary Harm (PSE 2)"},{key:"pse1",label:"Minor Permanent Harm (PSE 1)"},{key:"sse4",label:"Severe Temporary Harm (SSE 4)"}].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleHarmLevel(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleHarmLevel(btn,opt){
  _captureSelected(btn);
  const allBtns=document.querySelectorAll('#opts .opt-btn');
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.key==='sse5'){
    allBtns.forEach(b=>b.disabled=true);btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">SSE 5: Moderate Temporary Harm is the right classification.</span> The resident sustained a wrist injury requiring splinting for two weeks and an increased level of nursing assistance for activities of daily living during the recovery period. The SEC definition of SSE 5 includes events where significant harm requires a higher level of care or monitoring to resolve. The additional nursing assistance required for ADLs during a two-week recovery represents that elevated care need. ${requestedInfo?"The director of nursing confirmed full return to prior functional baseline after splint removal.":"The vignette confirms full return to prior baseline."} The harm was real, required meaningful intervention, and resolved fully.`;
  _logResponse('Discussion Point 3: Harm Level', fb.innerHTML);
    nb.classList.add('show');nb.onclick=()=>{step="csa";render();};
  } else if(opt.key==='pse2'){
    allBtns.forEach(b=>b.disabled=true);btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's look at what minor temporary harm requires.</span> PSE 2 captures minimal harm requiring little or no intervention. This resident required splinting, two weeks of restricted function, and an increased level of nursing assistance for activities of daily living. That level of impact and care need goes beyond the PSE 2 threshold. Have you thought about which category better captures a temporary injury requiring a meaningful increase in care?`;
  _logResponse('Discussion Point 3: Harm Level', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');nb.textContent="Continue to Discussion Point 4";allBtns.forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  } else if(opt.key==='pse1'){
    allBtns.forEach(b=>b.disabled=true);btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's revisit the permanent harm criteria.</span> The resident returned to his prior functional baseline after the splint was removed. Permanent harm requires that the harm has no expected change in the patient's clinical status. Full recovery has occurred here. Have you thought about which category captures significant but fully resolved harm?`;
  _logResponse('Discussion Point 3: Harm Level', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');nb.textContent="Continue to Discussion Point 4";allBtns.forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  } else {
    allBtns.forEach(b=>b.disabled=true);btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's look at the SSE 4 threshold.</span> SSE 4 is reserved for critical or potentially life-threatening harm requiring major surgery. A wrist splint applied for two weeks is a meaningful but minor intervention, not a critical or life-threatening condition requiring major surgery. Have you thought about which category better fits a temporary injury managed with splinting and additional nursing support?`;
  _logResponse('Discussion Point 3: Harm Level', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');nb.textContent="Continue to Discussion Point 4";allBtns.forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  }
}

function renderCsaSentinelStep(){
  app.innerHTML=`${pb(4,5,"Discussion Point 4: Should a CSA Be Completed?")}<div class="card"><span class="step-label">Step 4 of 5 &middot; Sentinel Event Determination</span><h3 class="case-title">Is This a Sentinel Event per The Joint Commission?</h3>${vign()}<div class="question">Do you believe this event meets The Joint Commission's definition of a sentinel event?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Priority Matrix</button></div></div>`;
  [{val:'yes',label:'Yes, this is a sentinel event'},{val:'no',label:'No, this is not a sentinel event'},{val:'unsure',label:'Unsure, I need to think through it'}].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleSentinel(btn,opt.val);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleSentinel(btn,val){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(val==='no'){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">That is the right determination.</span> The JC Sentinel Event Policy criteria for falls specify that a fall is a sentinel event when it results in a fracture, surgery, casting or traction, or death or permanent harm. A wrist splint applied for stabilization falls outside the fracture and casting threshold. The resident recovered fully. This event does not meet the sentinel event threshold. Let's use the SAC Matrix to determine the appropriate level of response.`;
  _logResponse('Discussion Point 4: Sentinel Event', fb.innerHTML);
    nb.classList.add('show');nb.onclick=()=>renderCsaMatrixStep();
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's look at the JC fall criteria carefully.</span><div class="info-box"><strong>JC Sentinel Event Policy (July 2026): Fall Criteria</strong>A fall is a sentinel event when it results in:<ul style="margin:8px 0 0 18px;padding:0;"><li>Any fracture</li><li>Surgery, casting, or traction</li><li>Required consult or management for neurological or internal injury</li><li>A patient with coagulopathy who receives blood products as a result of the fall</li><li>Death or permanent harm</li></ul></div>A wrist splint for stabilization is not the same as casting or fracture management. The resident recovered fully. Have you thought about how the intervention in this event compares to the sentinel event fall criteria?`;
  _logResponse('Discussion Point 4: Sentinel Event', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Reconsider My Answer";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');nb.textContent="Continue to Priority Matrix";document.querySelectorAll('#opts .opt-btn').forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  }
}

function renderCsaMatrixStep(){
  app.innerHTML=`${pb(4,5,"Discussion Point 4: Should a CSA Be Completed?")}<div class="card"><span class="step-label">Step 4 of 5 &middot; SAC Priority Matrix</span><h3 class="case-title">Using the SAC Matrix to Guide Resource Allocation</h3><div class="feedback show neutral" style="margin-bottom:16px;"><span style="font-weight:700;">This event is not a sentinel event.</span> The SAC Matrix will help determine the appropriate level of response.</div><div class="reference-box"><strong>SAC Matrix (RCA2, Appendix A)</strong><br><strong>Severity:</strong><ul><li><strong>Catastrophic:</strong> Death, major permanent loss of function, or any JC sentinel event</li><li><strong>Major:</strong> Permanent lessening of function; surgical intervention required; increased LOS or level of care for 3 or more patients</li><li><strong>Moderate:</strong> Increased LOS or level of care for 1 to 2 patients</li><li><strong>Minor:</strong> No injury, no increased stay or care</li></ul><strong>Probability:</strong><ul><li><strong>Frequent:</strong> Several times per year</li><li><strong>Occasional:</strong> Several times in 1 to 2 years</li><li><strong>Uncommon:</strong> Sometime in 2 to 5 years</li><li><strong>Remote:</strong> Sometime in 5 to 30 years</li></ul><em>Scenario context: Falls among high-fall-risk residents at your facility occur occasionally. Three similar volunteer notification events have occurred in the past 18 months.</em></div><div class="question">How would you classify the <strong>severity</strong>?</div><div class="options" id="sev-opts"></div><div class="feedback" id="sev-fb"></div><div id="prob-section" style="display:none;margin-top:22px;"><div class="question">How would you classify the <strong>probability</strong>?</div><div class="options" id="prob-opts"></div><div class="feedback" id="prob-fb"></div></div><div id="matrix-result" style="display:none;margin-top:22px;"></div><div class="nav-row"><button class="nav-btn" id="nb">See Final Summary</button></div></div>`;
  [{val:'catastrophic',label:'Catastrophic'},{val:'major',label:'Major'},{val:'moderate',label:'Moderate'},{val:'minor',label:'Minor'}].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleSev(btn,opt.val);
    document.getElementById('sev-opts').appendChild(btn);
  });
}

function handleSev(btn,val){
  document.querySelectorAll('#sev-opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('sev-fb');fb.classList.add('show');
  if(val==='moderate'){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">Moderate is the right severity classification.</span> The SAC Matrix defines Moderate as including events resulting in increased LOS or level of care for one to two patients. This resident required an increased level of nursing assistance for two weeks during his recovery, representing an increase in his care needs beyond his baseline. That aligns with Moderate severity.`;
  _logResponse('Discussion Point 4: SAC Severity', fb.innerHTML);
    showProb();
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    const h=val==='catastrophic'
      ?"Catastrophic requires death, major permanent loss of function, or a JC sentinel event. This event is not a sentinel event and the resident recovered fully. Have you thought about which category captures an increase in care level without permanent or catastrophic consequences?"
      :val==='major'
      ?"Major captures permanent lessening of function or surgical intervention. The resident returned to his prior baseline after two weeks. Have you thought about which category captures a temporary increase in care level with full recovery?"
      :"Minor captures events with no injury and no increased stay or level of care. This resident required a splint and two weeks of additional nursing assistance. Have you thought about which category captures that increase in care need?";
    fb.innerHTML=`<span style="font-weight:700;">Let's revisit the severity definitions.</span> ${h}`;
  _logResponse('Discussion Point 4: SAC Severity', fb.innerHTML);
    document.querySelectorAll('#sev-opts .opt-btn').forEach(b=>b.disabled=false);btn.disabled=true;
  }
}

function showProb(){
  document.getElementById('prob-section').style.display='block';
  [{val:'frequent',label:'Frequent'},{val:'occasional',label:'Occasional'},{val:'uncommon',label:'Uncommon'},{val:'remote',label:'Remote'}].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleProbFn(btn,opt.val);
    document.getElementById('prob-opts').appendChild(btn);
  });
}

function handleProbFn(btn,val){
  document.querySelectorAll('#prob-opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  sacProbability=val;btn.classList.add('selected-correct');
  const fb=document.getElementById('prob-fb');fb.classList.add('show','neutral');
  fb.innerHTML=`<span style="font-weight:700;">Probability noted.</span> ${val==='occasional'?"Occasional aligns with the scenario context. Moderate + Occasional = SAC 1.":"The scenario context suggests Occasional for falls among high-fall-risk residents. Note that Moderate severity produces a SAC score of 1 at Occasional, Uncommon, and Remote probability. The three similar events in 18 months may suggest a higher probability for the specific volunteer notification gap."}`;
  _logResponse('Discussion Point 4: SAC Probability', fb.innerHTML);
  showMatRes();
}

function showMatRes(){
  const r=document.getElementById('matrix-result');r.style.display='block';
  r.innerHTML=`<div class="reference-box" style="border-left:4px solid var(--slate-blue);"><strong>SAC Matrix Result: Score of 1 (Lowest Risk)</strong><br><br>Moderate severity with Occasional probability = SAC 1. Monitor and trend is the indicated response based on the matrix alone. However, note that the manager's update reveals three similar events in 18 months involving the same volunteer notification gap. When multiple similar events cluster around a specific system failure, trending those events together may reveal a pattern warranting a more structured review even when the individual event SAC score does not require one.<br><br><table class="summary-table" style="margin-top:8px;font-size:.85rem;"><tr><th></th><th>Catastrophic</th><th>Major</th><th>Moderate</th><th>Minor</th></tr><tr><td><strong>Frequent</strong></td><td style="text-align:center;">3</td><td style="text-align:center;">3</td><td style="text-align:center;">2</td><td style="text-align:center;">1</td></tr><tr><td><strong>Occasional</strong></td><td style="text-align:center;">3</td><td style="text-align:center;">2</td><td style="background:#eaf5ea;font-weight:700;text-align:center;">1</td><td style="text-align:center;">1</td></tr><tr><td><strong>Uncommon</strong></td><td style="text-align:center;">3</td><td style="text-align:center;">2</td><td style="background:#eaf5ea;font-weight:700;text-align:center;">1</td><td style="text-align:center;">1</td></tr><tr><td><strong>Remote</strong></td><td style="text-align:center;">3</td><td style="text-align:center;">2</td><td style="background:#eaf5ea;font-weight:700;text-align:center;">1</td><td style="text-align:center;">1</td></tr></table></div><div class="feedback show neutral" style="margin-top:16px;"><span style="font-weight:700;">Before moving on.</span> The SAC Matrix guides resource allocation alongside organizational policy and accreditation requirements. Always verify what your accreditation body and internal policies require.</div>`;
  const nb=document.getElementById('nb');nb.classList.add('show');nb.textContent="See Final Summary";
  nb.onclick=()=>{step="summary";render();};
}

function renderSummary(){
  const _currentAttemptSnapshot = _buildAttemptLog();
  _lastAttemptSnapshot = _currentAttemptSnapshot;
  var _snapshotToSend = _currentAttemptSnapshot;
  var _allToSend = _allAttempts.concat([_snapshotToSend]);

  app.innerHTML=`${pb(5,5,"Final Summary")}<div class="card" style="text-align:center;"><span class="step-label">Case 10 Complete</span><h3 class="case-title">Final SEC Classification</h3><div class="score-badge">SSE 5</div><p>Moderate Temporary Harm</p><table class="summary-table" style="text-align:left;"><tr><th>Discussion Point</th><th>Conclusion</th></tr><tr><td>Taxonomy Event Type</td><td>EE3 &mdash; Fall (Environmental); Long-Term Care Setting</td></tr><tr><td>Deviation from GAPS?</td><td>Yes &mdash; volunteer did not notify nursing staff upon returning a high-fall-risk resident; no protocol existed requiring this notification</td></tr><tr><td>Did the deviation reach the patient?</td><td>Yes &mdash; nursing staff unaware of resident's return; no monitoring or redirection possible</td></tr><tr><td>Additional information requested?</td><td>${requestedInfo?"Yes &mdash; full recovery confirmed; three similar volunteer notification events identified in the past 18 months; no protocol requiring notification existed":"No"}</td></tr><tr><td>Level of harm</td><td>SSE 5 &mdash; Moderate Temporary Harm (wrist splint; two weeks of increased nursing assistance; full recovery)</td></tr><tr><td>SEC Classification</td><td>Serious Safety Event</td></tr><tr><td>Sentinel event per JC?</td><td>No &mdash; wrist splint does not meet fracture or casting threshold; full recovery</td></tr><tr><td>SAC Matrix score</td><td>1 (Moderate severity, Occasional probability) &mdash; monitor and trend; note three similar events in 18 months</td></tr></table><div class="feedback show neutral" style="text-align:left;margin-top:20px;"><span style="font-weight:700;">A note on the long-term care setting and volunteer programs.</span> This case illustrates a dimension of patient safety that extends beyond licensed clinical staff. Volunteers, contractors, transport aides, and other non-clinical personnel who interact with patients or residents are part of the safety environment whether or not they are covered by clinical protocols. An administrator overseeing a long-term care facility must ensure that everyone with access to high-risk residents understands their role in the safety system, including what to do and who to notify when they complete an interaction. Safety does not stop at the nursing station.</div><button class="restart-btn" id="rb"> <button class="next-case-btn" id="next-case-btn" onclick="window.parent.postMessage({type:'open-case',caseNum:11},'*')">Go to Case 11 &#8594;</button>Restart Case 10</button></div>`;
  
  // Send completion data to parent shell
  // Send completion data to parent shell using pre-captured snapshot
  var _snapshotToSend = _currentAttemptSnapshot;
  var _allToSend = _allAttempts.concat([_snapshotToSend]);
  setTimeout(function(){
    window.parent.postMessage({
      type: 'case-complete',
      caseNum: 10,
      log: _snapshotToSend,
      attempts: _allToSend
    }, '*');
  }, 100);
  document.getElementById('rb').onclick=()=>{requestedInfo=null;kctIndex=0;sentinelAnswer=null;sacSeverity=null;sacProbability=null;
    if (_lastAttemptSnapshot) { _allAttempts.push(_lastAttemptSnapshot); _lastAttemptSnapshot = null; }
    _attemptLog = [];
    _attemptStartTime = new Date();
    step="intro";render();};
}

function render(){
  if(step==="intro")renderIntro();
  else if(step==="deviation")renderDeviationStep();
  else if(step==="kct")renderKctStep();
  else if(step==="reach")renderReachStep();
  else if(step==="harm-info")renderHarmInfoStep();
  else if(step==="harm-level")renderHarmLevelStep();
  else if(step==="csa")renderCsaSentinelStep();
  else if(step==="summary")renderSummary();
}
render();
</script></body>
</html>
