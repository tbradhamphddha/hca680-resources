<style>
  :root{--edgewood-red:#BB0000;--black:#000000;--white:#FFFFFF;--dark-gold:#C8932B;--warm-grey:#F0EEEB;--dark-web-grey:#58595B;--slate-blue:#5794AD;--light-grey:#C2C6C8;}
  *{box-sizing:border-box;}body{font-family:'Source Sans Pro',Arial,sans-serif;background:var(--warm-grey);color:var(--black);margin:0;padding:0;line-height:1.6;}
  .wrap{max-width:860px;margin:0 auto;padding:24px 20px 60px;}
  header{background:var(--black);color:var(--white);padding:28px 20px;text-align:center;}

  header p{margin:0;color:var(--light-grey);font-size:.95rem;}
  .accent-bar{height:6px;background:var(--edgewood-red);}
  .card{background:var(--white);border:1px solid var(--light-grey);border-radius:6px;padding:24px;margin-top:24px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
  .progress-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;margin-bottom:4px;font-size:.9rem;color:var(--dark-web-grey);}
  .progress-bar-bg{background:var(--light-grey);border-radius:4px;height:8px;overflow:hidden;margin-bottom:4px;}
  .progress-bar-fill{background:var(--edgewood-red);height:100%;transition:width .3s ease;}
  .step-label{display:inline-block;background:var(--dark-gold);color:var(--white);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:3px;margin-bottom:12px;}
  .case-title{font-family:'Spectral',Georgia,serif;font-size:1.4rem;margin:0 0 14px;color:var(--black);}
  .vignette{background:var(--warm-grey);border-left:4px solid var(--slate-blue);padding:16px 18px;border-radius:4px;margin-bottom:18px;font-size:1rem;}
  .question{font-weight:700;margin-bottom:4px;font-size:1.05rem;}
  .helper-text{font-size:.92rem;color:var(--dark-web-grey);margin:6px 0 14px;}
  .reference-box{background:var(--warm-grey);border:1px solid var(--light-grey);border-radius:4px;padding:12px 16px;margin-bottom:16px;font-size:.88rem;color:var(--dark-web-grey);}
  .reference-box strong{color:var(--black);}
  .reference-box ul{margin:8px 0 0;padding-left:18px;}
  .reference-box li{margin-bottom:4px;}
  .info-box{background:#fff8e6;border:1px solid var(--dark-gold);border-left:4px solid var(--dark-gold);border-radius:4px;padding:14px 16px;margin:16px 0;font-size:.95rem;}
  .info-box strong{display:block;margin-bottom:4px;color:var(--dark-gold);}
  .options{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;}
  .opt-btn{flex:1 1 220px;background:var(--white);border:2px solid var(--slate-blue);color:var(--black);font-family:inherit;font-size:.98rem;font-weight:600;padding:14px 18px;border-radius:5px;cursor:pointer;transition:all .15s ease;text-align:left;}
  .opt-btn:hover{background:var(--slate-blue);color:var(--white);}
  .opt-btn.selected-correct{background:#2e7d32;border-color:#2e7d32;color:var(--white);}
  .opt-btn.selected-redirect{background:var(--edgewood-red);border-color:var(--edgewood-red);color:var(--white);}
  .opt-btn:disabled{cursor:default;opacity:1;}
  .opt-btn:disabled:not(.selected-correct):not(.selected-redirect){opacity:.45;}
  .feedback{margin-top:18px;padding:16px 18px;border-radius:5px;font-size:.97rem;display:none;}
  .feedback.show{display:block;animation:fadein .25s ease;}
  .feedback.correct{background:#eaf5ea;border-left:4px solid #2e7d32;}
  .feedback.neutral{background:var(--warm-grey);border-left:4px solid var(--slate-blue);}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .nav-row{display:flex;justify-content:flex-end;margin-top:22px;}
  .nav-btn{background:var(--edgewood-red);color:var(--white);border:none;font-family:inherit;font-size:1rem;font-weight:700;padding:12px 28px;border-radius:5px;cursor:pointer;display:none;}
  .nav-btn.show{display:inline-block;}
  .nav-btn:hover{background:#930000;}
  .summary-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.92rem;}
  .summary-table th,.summary-table td{border:1px solid var(--light-grey);padding:8px 10px;text-align:left;}
  .summary-table th{background:var(--black);color:var(--white);font-family:'Spectral',Georgia,serif;font-weight:600;}
  .summary-table tr:nth-child(even) td{background:var(--warm-grey);}
  .score-badge{display:inline-block;background:var(--edgewood-red);color:var(--white);font-family:'Spectral',Georgia,serif;font-size:1.6rem;font-weight:700;padding:14px 28px;border-radius:6px;margin:14px 0;}
  .small-note{font-size:.85rem;color:var(--dark-web-grey);margin-top:18px;text-align:center;}
  .restart-btn{background:transparent;border:2px solid var(--dark-web-grey);color:var(--dark-web-grey);font-family:inherit;font-weight:700;padding:10px 22px;border-radius:5px;cursor:pointer;margin-top:18px;}
  .restart-btn:hover{background:var(--dark-web-grey);color:var(--white);}

<div class="accent-bar"></div>
<div class="wrap"><div id="app"></div></div>
<script>
const VIGNETTE = "Two patients with similar last names are checked in at an outpatient radiology center during the same appointment window. A radiology technologist calls out a last name from the waiting room doorway. The wrong patient responds and is escorted back for a chest X-ray that had been ordered for the other patient. The technologist does not use two patient identifiers, does not ask for a date of birth, and does not scan a wristband or check a photo ID. The X-ray is performed on the wrong patient, who has a documented history of prior radiation exposure being tracked for cumulative dose monitoring. The error is identified when the correct patient checks in at the front desk and staff realize the appointment has already been marked complete. The wrong patient received an unanticipated X-ray without clinical indication.";
const MANAGER_UPDATE = "During the post-event review, the manager identifies this as the second wrong-patient imaging event at this facility within the past three days. A pull of event reports over the past month reveals ten wrong-patient scan events at this outpatient center. None of the previous nine events triggered a formal review or resulted in a process change. The patient who received the unanticipated X-ray has a documented history of radiation therapy for a prior malignancy, and the cumulative dose received is now above the threshold that triggers a radiation safety consultation. The radiation oncologist has noted the exposure is clinically significant and warrants monitoring.";

let step="intro", requestedInfo=null, kctIndex=0, sentinelAnswer=null, sacSeverity=null, sacProbability=null;
const app=document.getElementById('app');
const _caseStartTime = new Date();
let _attemptLog = [];
let _allAttempts = [];
let _lastAttemptSnapshot = null;
let _attemptStartTime = new Date();
var _pendingSelected = '';

function _captureSelected(btn) {
  _pendingSelected = btn.textContent.trim();
}

function _logResponse(stepName, fbHTML) {
  var alreadyLogged = _attemptLog.some(function(r){ return r.step === stepName; });
  if (alreadyLogged) return;
  var div = document.createElement('div');
  div.innerHTML = fbHTML || '';
  var cleanText = (div.textContent || div.innerText || '').trim();
  _attemptLog.push({ step: stepName, selected: _pendingSelected, feedback: cleanText });
}

function _buildAttemptLog() {
  var endTime = new Date();
  var elapsed = Math.round((endTime - _attemptStartTime) / 1000);
  var mins = Math.floor(elapsed / 60);
  var secs = elapsed % 60;
  return {
    finalClassification: 'PSE 2 or PSE 3 (path-dependent on manager update)',
    taxonomyEventType: 'PR2 — Wrong Patient (Procedural); Outpatient Radiology',
    managerUpdateRequested: (typeof requestedInfo !== 'undefined' && requestedInfo) ? 'Yes' : 'No',
    sentinelEvent: (typeof sentinelAnswer !== 'undefined') ? (sentinelAnswer === 'yes' ? 'Yes' : sentinelAnswer === 'no' ? 'No' : 'Not applicable') : 'Not applicable',
    sacSeverity: (typeof sacSeverity !== 'undefined' && sacSeverity) ? sacSeverity : 'Not applicable',
    sacProbability: (typeof sacProbability !== 'undefined' && sacProbability) ? sacProbability : 'Not applicable',
    startTime: _attemptStartTime.toLocaleString(),
    endTime: endTime.toLocaleString(),
    timeOnTask: mins + ' min ' + secs + ' sec',
    responses: _attemptLog.slice()
  };
}


function vign(){return `<div class="vignette"><strong>The Event:</strong> ${VIGNETTE}</div>`;}
function pb(n,t,l){return `<div class="progress-row"><span>${l}</span><span>Step ${n} of ${t}</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round(n/t*100)}%;"></div></div>`;}

function renderIntro(){
  app.innerHTML=`<div class="card"><span class="step-label">Case 5</span><div style="font-size:1.05rem;margin-bottom:16px;"><p>You open the next event: a patient identification concern reported from an outpatient radiology center. This case takes place in the ambulatory care setting.</p><p>Read the event carefully before working through the discussion points.</p></div>${vign()}<div class="nav-row"><button class="nav-btn show" id="nb">Begin Discussion</button></div></div>`;
  document.getElementById('nb').onclick=()=>{step="deviation";render();};
}

function renderDeviationStep(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Identifying Deviations")}<div class="card"><span class="step-label">Step 1 of 5</span><h3 class="case-title">Were There Any Deviations?</h3>${vign()}<div class="question">Was there a deviation from Generally Accepted Performance Standards (GAPS) in this event? Select the option that best represents the main deviation.</div><div class="helper-text">Look for the deviation most directly and causally connected to what happened to the patient.</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  [
    {key:"id",label:"The two-identifier patient identification process was not followed before performing the procedure",type:"main"},
    {key:"name",label:"The patients had similar last names, which caused the technologist to select the wrong patient",type:"incorrect"},
    {key:"schedule",label:"The scheduling system allowed two patients with similar names to be booked in the same appointment window",type:"secondary"},
    {key:"wristband",label:"The outpatient center does not use wristbands, making identification impossible",type:"incorrect"},
    {key:"none",label:"There was no deviation in Generally Accepted Performance Standards (GAPS)",type:"no-gaps"}
  ].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleDev(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleDev(btn,opt){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.type==="main"){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">That identifies the central deviation in this event.</span> The standard of care for patient identification, in every care setting including outpatient radiology, requires verification using at least two patient identifiers before any procedure. Calling a name from a doorway and proceeding when someone responds is not patient identification: it is name recognition. The technologist did not use a date of birth, a photo ID, or any other second identifier. That single deviation from standard practice is what made the wrong-patient scan possible.<br><br>Now let's look at the broader context this event sits within.`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Explore the System Context";
    nb.onclick=()=>{step="deviation-round2";render();};
  } else if(opt.type==="secondary"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Scheduling proximity is worth noting as a contributing system factor.</span> When two patients with similar names share an appointment window, the risk of a name mix-up increases. However, that risk exists precisely to be caught by patient identification procedures. Have you thought about what the standard of care requires at the point of patient contact, regardless of how similar the names are?`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>renderDeviationStep();
  } else if(opt.type==="incorrect"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    const d=opt.key==="name"
      ?"Similar names are a risk condition, not a GAPS deviation. The deviation is in what the technologist did, not in what the names looked like. Have you thought about what the standard of care requires a clinician to do when name similarity creates ambiguity, rather than treating a name as sufficient identification?"
      :"Outpatient settings do not always use wristbands, but the absence of wristbands does not eliminate the requirement for two-identifier verification. Date of birth, photo ID, and other identifiers are available in outpatient settings. Have you thought about what two-identifier verification looks like when wristbands are not part of the workflow?";
    fb.innerHTML=`<span style="font-weight:700;">Let's look at this from a different angle.</span> ${d}`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>renderDeviationStep();
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's explore that conclusion together before we settle on it.</span> One useful tool when we are uncertain whether a GAPS deviation exists is the <strong>Known Complication Test</strong>. If the answer to all four questions is YES, the event is a known complication. If the answer to any one is NO, it is a safety event. Let's work through those questions.`;
  _logResponse('Unknown Step', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Apply the Known Complication Test";
    nb.onclick=()=>{kctIndex=0;step="kct";render();};
  }
}

function renderDeviationRound2(){
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Identifying Deviations")}<div class="card"><span class="step-label">Step 1 of 5 &middot; Exploring the System Context</span><h3 class="case-title">What Does the Pattern Tell Us?</h3>${vign()}<div class="feedback show correct" style="margin-bottom:16px;"><span style="font-weight:700;">The proximate deviation is identified.</span> Two-identifier verification was not performed. Now consider what the broader context tells us about whether this is an isolated individual failure or a system condition.</div><div class="question">Which of the following best describes the system-level factor most relevant to understanding how this event occurred?</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue to Discussion Point 2</button></div></div>`;
  [
    {key:"training",label:"The technologist had not received training on patient identification procedures",type:"incorrect"},
    {key:"pattern",label:"The two-identifier requirement had not been consistently enforced at this facility, and the pattern of ten events in one month suggests identification verification had broken down as a routine practice",type:"main"},
    {key:"volume",label:"High patient volume in the outpatient setting made it impractical to verify two identifiers for every patient",type:"partial"},
    {key:"policy",label:"The facility did not have a patient identification policy for the outpatient setting",type:"partial"}
  ].forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>handleCulture(btn,opt);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleCulture(btn,opt){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show');
  const nb=document.getElementById('nb');
  if(opt.type==="main"){
    btn.classList.add('selected-correct');fb.classList.add('correct');
    fb.innerHTML=`<span style="font-weight:700;">The pattern is the signal.</span> Ten wrong-patient scan events in one month at a single outpatient facility is not a series of ten individual errors. It is evidence that the patient identification process has broken down at the system level. The fact that none of the previous nine events triggered a formal review or process change tells us something important about the organization's surveillance and response systems as well: the signals were present, and nothing happened.<br><br>This is a case where the individual event in front of you is the visible tip of a larger system failure. A single-event review might identify what went wrong in this encounter. But the pattern calls for a broader analysis that looks at the identification process across all ten events, the conditions that allowed the breakdown to persist unaddressed, and what it would take to close the gap between the stated policy and the actual practice across this facility.`;
  _logResponse('Discussion Point 1: System Factor', fb.innerHTML);
    nb.classList.add('show');
    nb.onclick=()=>{step="reach";render();};
  } else if(opt.type==="partial"){
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    const d=opt.key==="volume"
      ?"Volume is a real operational pressure in outpatient settings, and it is worth noting as a contributing factor. However, ten events in one month across what may be dozens or hundreds of encounters suggests something more than just a busy schedule. Have you thought about what ten events in one month tells us about whether identification verification was happening at all, regardless of volume?"
      :"Policy gaps are worth investigating. However, two-identifier patient identification is a national standard that applies across all care settings, including outpatient imaging, regardless of whether a facility has documented its own specific policy. Have you thought about what ten wrong-patient events in one month tells us about whether this was a policy knowledge issue or a practice issue?";
    fb.innerHTML=`<span style="font-weight:700;">That is one dimension worth examining.</span> ${d}`;
  _logResponse('Discussion Point 1: System Factor', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');document.querySelectorAll('#opts .opt-btn').forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  } else {
    btn.classList.add('selected-redirect');fb.classList.add('neutral');
    fb.innerHTML=`<span style="font-weight:700;">Let's look at what the event tells us directly.</span> The technologist performed the identification step of calling a name from the doorway, which suggests awareness that some form of identification is expected. The issue is not that the technologist did not know identification was required: it is that the practice in place did not meet the two-identifier standard. Have you thought about what ten events in one month tells us about whether this was an individual knowledge gap or a practice pattern across the facility?`;
  _logResponse('Discussion Point 1: System Factor', fb.innerHTML);
    nb.classList.add('show');nb.textContent="Try Again";
    nb.onclick=()=>{fb.className='feedback';fb.innerHTML='';nb.classList.remove('show');document.querySelectorAll('#opts .opt-btn').forEach(b=>{b.disabled=false;b.className='opt-btn';});};
  }
}

const KCT_QS=[
  {text:"Was the procedure (chest X-ray) appropriate or warranted for the patient who received it, based on nationally recognized standards of care?",answer:"NO"},
  {text:"Was the outcome (unanticipated radiation exposure) a known risk of the procedure, and was the standard of care employed to mitigate that risk?",answer:"NO"},
  {text:"Was the outcome identified in a timely manner?",answer:"YES"},
  {text:"Was the outcome addressed according to the standard of care, in a timely manner?",answer:"YES"}
];

function renderKctStep(){
  if(kctIndex>=KCT_QS.length){renderKctResult();return;}
  const q=KCT_QS[kctIndex];
  app.innerHTML=`${pb(1,5,"Discussion Point 1: Known Complication Test")}<div class="card"><span class="step-label">Known Complication Test &middot; Question ${kctIndex+1} of 4</span><h3 class="case-title">Is This a Known Complication or a Safety Event?</h3>${vign()}<div class="reference-box"><strong>Reminder:</strong> ALL four YES = Known Complication. ANY NO = safety event.</div><div class="question">${q.text}</div><div class="options" id="opts"></div><div class="feedback" id="fb"></div><div class="nav-row"><button class="nav-btn" id="nb">Continue</button></div></div>`;
  ['YES','NO'].forEach(val=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.style.flex="1 1 100px";btn.textContent=val;
    btn.onclick=()=>handleKct(btn,val,q);
    document.getElementById('opts').appendChild(btn);
  });
}

function handleKct(btn,val,q){
  document.querySelectorAll('#opts .opt-btn').forEach(b=>b.disabled=true);
  _captureSelected(btn);
  const isC=val===q.answer;
  btn.classList.add(isC?'selected-correct':'selected-redirect');
  if(!isC)document.querySelectorAll('#opts .opt-btn').forEach(b=>{if(b.textContent===q.answer)b.classList.add('selected-correct');});
  _captureSelected(btn);
  const fb=document.getElementById('fb');fb.classList.add('show',isC?'correct':'neutral');
  const notes=[
    ["The chest X-ray was not ordered for the patient who received it. For the patient who was actually scanned, the procedure had no clinical indication. That immediately points to NO.","Think about this from the perspective of the patient who received the scan: was this X-ray ordered for them? Was it clinically indicated for them? The answer is no, which points to NO for this question."],
    ["Because the procedure was not indicated for this patient, there is no framework for discussing whether known risks were mitigated. The exposure itself was the unintended outcome, and it occurred because the identification process failed, not as a risk of an appropriate procedure. This points to NO.","Consider the logic of this question: it asks whether the complication was a known risk of the procedure AND whether standard of care steps were taken to mitigate it. When the procedure itself should not have occurred, the entire risk-mitigation framework is disrupted. This points to NO."],
    ["The error was identified when the correct patient arrived at the front desk and staff noticed the appointment had already been marked complete. While not immediate, the identification was made in time to prevent further action based on incorrect patient data.","Based on the event, the error was caught when the correct patient checked in. That is a timely identification in the context of this type of event, pointing toward YES."],
    ["The event was identified and the situation was documented. A radiation safety follow-up would be the appropriate next step, which the event process would initiate.","Once identified, the appropriate response is to document the exposure and initiate a radiation safety consultation, which the event record would support. That points toward YES for this question."]
  ];
  const[c,i]=notes[kctIndex];

  else if(step==="harm-info")renderHarmInfoStep();
  else if(step==="harm-level")renderHarmLevelStep();
  else if(step==="csa")renderCsaSentinelStep();
  else if(step==="summary")renderSummary();
}
render();
</script></body>
